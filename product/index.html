<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Product Details - myvendor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --forest:    #0d3320;
            --green:     #1a6b3c;
            --mint:      #22c55e;
            --sage:      #86efac;
            --cream:     #faf7f0;
            --cream-dark:#f0ebe0;
            --warm-white:#fffcf5;
            --text-main: #0d1f12;
            --text-mid:  #3a5c43;
            --text-soft: #6b8f72;
            --border:    #dde8de;
            --wa-green:  #25D366;
            --shadow-sm: 0 8px 20px rgba(0, 32, 0, 0.04);
            --shadow-md: 0 12px 28px rgba(0, 20, 0, 0.08);
            --radius-lg: 28px;
            --radius-md: 18px;
            --radius-sm: 12px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--text-main);
            padding-bottom: 0;
        }

        /* subtle grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 180px;
        }

        /* main container */
        .product-container {
            max-width: 640px;
            margin: 0 auto;
            background: var(--warm-white);
            min-height: 100vh;
            position: relative;
            border-radius: 0;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.02);
        }

        /* image section */
        .product-media {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--cream-dark);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .placeholder-icon {
            font-size: 4rem;
            color: var(--text-soft);
            opacity: 0.5;
        }
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(13, 51, 32, 0.7);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
            z-index: 2;
        }
        .back-button:hover {
            background: rgba(13, 51, 32, 0.9);
            color: var(--sage);
        }

        /* content card */
        .product-content {
            background: var(--warm-white);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            margin-top: -24px;
            position: relative;
            z-index: 2;
            padding: 1.8rem 1.5rem 1.5rem;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.02);
        }

        /* badges row */
        .badge-row {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .badge {
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .badge-category {
            background: #e4f5e9;
            color: var(--green);
        }
        .badge-outstock {
            background: #fee2e2;
            color: #dc2626;
        }
        .badge-preorder {
            background: #fef3c7;
            color: #d97706;
        }

        /* title & price */
        .product-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: var(--forest);
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }
        .price-row {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }
        .product-price {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.8rem;
            color: var(--green);
        }

        /* attributes chips */
        .attributes-row {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .attr-chip {
            background: var(--cream-dark);
            border: 1px solid var(--border);
            padding: 0.4rem 0.9rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-mid);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .divider-icon {
            width: 28px;
            height: 28px;
            background: #e4f5e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--green);
            font-size: 0.7rem;
        }

        /* description */
        .section-label {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--forest);
            margin-bottom: 0.5rem;
        }
        .product-description {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-mid);
            white-space: pre-line;
        }

        /* store link */
        .store-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--cream-dark);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 0.5rem 1rem 0.5rem 0.7rem;
            text-decoration: none;
            margin-top: 1.5rem;
            transition: background 0.2s;
        }
        .store-link:hover {
            background: #e4ede5;
        }
        .store-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--green), var(--forest));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.7rem;
        }
        .store-text {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-mid);
        }
        .store-name {
            font-weight: 700;
            color: var(--forest);
        }

        /* action bar */
        .action-bar {
            position: sticky;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(250, 247, 240, 0.92);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border);
            padding: 0.8rem 1rem;
            z-index: 100;
        }
        .action-bar .container {
            max-width: 640px;
            margin: 0 auto;
        }
        .btn-order {
            width: 100%;
            background: linear-gradient(135deg, var(--green), var(--forest));
            border: none;
            padding: 0.9rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(13, 51, 32, 0.2);
        }
        .btn-order:active {
            transform: scale(0.98);
        }
        .btn-order.disabled {
            background: var(--border);
            box-shadow: none;
            pointer-events: none;
            color: var(--text-soft);
        }

        /* loading & error states */
        .loading-state, .error-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            gap: 1rem;
            padding: 2rem;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-state h3 {
            font-family: 'Playfair Display', serif;
            color: var(--forest);
        }
        .hidden {
            display: none !important;
        }

        /* modal styling */
        .modal-content {
            border: none;
            border-radius: var(--radius-lg);
            background: var(--warm-white);
            overflow: hidden;
        }
        .modal-header {
            background: var(--forest);
            padding: 1.2rem 1.5rem;
            border-bottom: none;
        }
        .modal-title {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-close-modal {
            background: rgba(255,255,255,0.15);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-body {
            padding: 1.5rem;
        }
        .order-summary {
            background: var(--cream-dark);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.8rem;
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }
        .order-summary-img {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .order-summary-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .form-control-modern {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--warm-white);
            transition: 0.2s;
        }
        .form-control-modern:focus {
            border-color: var(--green);
            outline: none;
            box-shadow: 0 0 0 3px rgba(26,107,60,0.1);
        }
        .btn-wa {
            width: 100%;
            background: var(--wa-green);
            border: none;
            padding: 0.9rem;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }
    </style>
</head>
<body>

<div id="loadingState" class="loading-state">
    <div class="loader"></div>
    <span>Loading product details...</span>
</div>

<div id="errorState" class="error-state hidden">
    <i class="bi bi-shop" style="font-size: 3rem; color: var(--text-soft);"></i>
    <h3>Something went wrong</h3>
    <p id="errorText">Product not found.</p>
    <a href="/" id="errorBackBtn" class="btn btn-outline-success rounded-pill">Back to store</a>
</div>

<div id="productContainer" class="product-container hidden">
    <div class="product-media">
        <img id="prodImage" src="" alt="Product image" class="hidden">
        <div id="placeholderIcon" class="placeholder-icon hidden">📦</div>
        <a href="#" id="backButton" class="back-button"><i class="bi bi-arrow-left"></i> Store</a>
    </div>

    <div class="product-content">
        <div class="badge-row" id="badgeRow"></div>

        <h1 class="product-title" id="prodTitle">Product Name</h1>

        <div class="price-row">
            <span class="product-price" id="prodPrice">₦0</span>
        </div>

        <div class="attributes-row" id="attributesRow"></div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-icon"><i class="bi bi-leaf-fill"></i></div>
            <div class="divider-line"></div>
        </div>

        <div class="section-label">About this product</div>
        <p class="product-description" id="prodDesc">No description provided.</p>

        <a href="#" id="storeLink" class="store-link">
            <div class="store-icon"><i class="bi bi-shop"></i></div>
            <div class="store-text">Sold by <span class="store-name" id="storeName">Store</span></div>
        </a>
    </div>

    <div class="action-bar">
        <div class="container px-0">
            <button id="orderButton" class="btn-order" data-bs-toggle="modal" data-bs-target="#orderModal">
                <i class="bi bi-cart-plus"></i> Proceed to Order
            </button>
        </div>
    </div>
</div>

<!-- Order Modal -->
<div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 480px;">
        <div class="modal-content">
            <div class="modal-header d-flex justify-content-between">
                <div class="modal-title">
                    <i class="bi bi-cart-check"></i> Order Details
                </div>
                <button type="button" class="btn-close-modal" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="modal-body">
                <div class="order-summary">
                    <div class="order-summary-img" id="modalImgPlaceholder">📦</div>
                    <div>
                        <div style="font-weight: 600;" id="modalProdName">—</div>
                        <div style="font-weight: 700; color: var(--green);" id="modalProdPrice">₦0</div>
                    </div>
                </div>

                <form onsubmit="window.sendOrderWhatsApp(event)">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase text-muted">Your name</label>
                        <input type="text" id="buyerName" class="form-control-modern" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase text-muted">Phone number</label>
                        <input type="tel" id="buyerPhone" class="form-control-modern" required>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label small fw-bold text-uppercase text-muted">Quantity</label>
                            <input type="number" id="buyerQty" class="form-control-modern" value="1" min="1" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold text-uppercase text-muted">Total</label>
                            <div id="totalDisplay" class="form-control-modern" style="background: #e4f5e9; border-color: #c8e6d9;">₦0</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase text-muted">Delivery address</label>
                        <textarea id="buyerAddress" class="form-control-modern" rows="2" required></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase text-muted">Notes (optional)</label>
                        <input type="text" id="buyerNotes" class="form-control-modern" placeholder="Size, color, etc.">
                    </div>
                    <button type="submit" class="btn-wa"><i class="bi bi-whatsapp"></i> Send via WhatsApp</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const SUPABASE_URL = 'https://sotdghhayztnpwnrzjzu.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_OcOKwSDnoCGm_rt725Bi-g_rV6tjGlK';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentVendor = null;
    let currentProduct = null;

    function showError(message, vendorSlug = null) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('productContainer').classList.add('hidden');
        document.getElementById('errorState').classList.remove('hidden');
        document.getElementById('errorText').innerText = message;
        if (vendorSlug) {
            document.getElementById('errorBackBtn').href = `/${vendorSlug}`;
        }
    }

    async function loadProduct() {
        const params = new URLSearchParams(window.location.search);
        const vendorSlug = params.get('vendor');
        const productId = params.get('id');

        if (!vendorSlug || !productId) {
            showError('Invalid product link.');
            return;
        }

        // Fetch vendor
        const { data: vendor, error: vendorErr } = await supabase
            .from('vendor_profiles')
            .select('*')
            .eq('slug', vendorSlug)
            .single();

        if (vendorErr || !vendor) {
            showError('Store not found.', vendorSlug);
            return;
        }
        currentVendor = vendor;

        // Fetch product
        const { data: product, error: prodErr } = await supabase
            .from('products')
            .select('*')
            .eq('id', productId)
            .single();

        if (prodErr || !product) {
            showError('Product not available.', vendorSlug);
            return;
        }
        currentProduct = product;

        // Update page title
        document.title = `${product.title} - ${vendor.business_name}`;

        // Back button and store link
        document.getElementById('backButton').href = `/${vendorSlug}`;
        document.getElementById('storeLink').href = `/${vendorSlug}`;
        document.getElementById('storeName').innerText = vendor.business_name;

        // Product details
        document.getElementById('prodTitle').innerText = product.title;
        document.getElementById('prodPrice').innerText = `₦${parseFloat(product.price).toLocaleString()}`;
        document.getElementById('prodDesc').innerText = product.description || 'No description provided.';

        // Badges
        const badgeRow = document.getElementById('badgeRow');
        badgeRow.innerHTML = '';

        if (product.category && product.category !== 'Other') {
            badgeRow.innerHTML += `<span class="badge badge-category"><i class="bi bi-tag"></i> ${product.category}</span>`;
        }

        if (product.status === 'out_of_stock' || (product.in_stock === false)) {
            badgeRow.innerHTML += `<span class="badge badge-outstock"><i class="bi bi-x-circle"></i> Out of Stock</span>`;
            const orderBtn = document.getElementById('orderButton');
            orderBtn.disabled = true;
            orderBtn.innerHTML = '<i class="bi bi-x-circle"></i> Out of Stock';
            orderBtn.classList.add('disabled');
        } else if (product.status === 'pre_order') {
            badgeRow.innerHTML += `<span class="badge badge-preorder"><i class="bi bi-clock-history"></i> Pre-order</span>`;
        }

        // Attributes (colors, quantity)
        const attrRow = document.getElementById('attributesRow');
        attrRow.innerHTML = '';
        if (product.colors && product.colors.trim() !== '') {
            attrRow.innerHTML += `<div class="attr-chip"><i class="bi bi-palette"></i> ${product.colors}</div>`;
        }
        if (product.quantity !== null && product.quantity !== undefined) {
            attrRow.innerHTML += `<div class="attr-chip"><i class="bi bi-box-seam"></i> ${product.quantity} left</div>`;
        }

        // Image
        const imgEl = document.getElementById('prodImage');
        const placeholderIcon = document.getElementById('placeholderIcon');
        if (product.image_url) {
            imgEl.src = product.image_url;
            imgEl.classList.remove('hidden');
            placeholderIcon.classList.add('hidden');
            document.getElementById('modalImgPlaceholder').innerHTML = `<img src="${product.image_url}" alt="${product.title}">`;
        } else {
            imgEl.classList.add('hidden');
            placeholderIcon.classList.remove('hidden');
        }

        // Modal product details
        document.getElementById('modalProdName').innerText = product.title;
        document.getElementById('modalProdPrice').innerText = `₦${parseFloat(product.price).toLocaleString()}`;

        // Update total on quantity change
        const qtyInput = document.getElementById('buyerQty');
        const totalDisplay = document.getElementById('totalDisplay');
        const updateTotal = () => {
            const qty = parseInt(qtyInput.value) || 1;
            const total = currentProduct.price * qty;
            totalDisplay.innerText = `₦${total.toLocaleString()}`;
        };
        qtyInput.addEventListener('input', updateTotal);
        updateTotal();

        // Hide loading, show content
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('productContainer').classList.remove('hidden');

        // Track product view
        supabase.from('analytics_events').insert([{
            vendor_id: vendor.id,
            product_id: product.id,
            event_type: 'product_view'
        }]).then();
    }

    // WhatsApp order handler
    window.sendOrderWhatsApp = function(e) {
        e.preventDefault();
        const name = document.getElementById('buyerName').value;
        const phone = document.getElementById('buyerPhone').value;
        const qty = parseInt(document.getElementById('buyerQty').value);
        const address = document.getElementById('buyerAddress').value;
        const notes = document.getElementById('buyerNotes').value;
        const total = currentProduct.price * qty;

        const message = `Hello *${currentVendor.business_name}*, I'd like to place an order!

🛒 *Item:* ${currentProduct.title}
🔢 *Quantity:* ${qty}
💰 *Total:* ₦${total.toLocaleString()}

*── DETAILS ──*
👤 *Name:* ${name}
📞 *Phone:* ${phone}
📍 *Address:* ${address}
${notes ? `📝 *Notes:* ${notes}\n` : ''}
🔗 *Link:* ${window.location.href}`;

        const vendorWhatsApp = currentVendor.whatsapp_number || currentVendor.phone || '';
        window.open(`https://wa.me/${vendorWhatsApp}?text=${encodeURIComponent(message)}`, '_blank');

        // Track WhatsApp click
        supabase.from('analytics_events').insert([{
            vendor_id: currentVendor.id,
            product_id: currentProduct.id,
            event_type: 'whatsapp_click'
        }]).then();

        // Close modal
        bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide();
    };

    loadProduct();
</script>
</body>
</html>
