<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory - myvendor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body class="bg-light">

  <nav class="dash-nav bg-white border-bottom py-3 sticky-top">
    <div class="container d-flex justify-content-between align-items-center" style="max-width: 600px;">
      <a href="/dashboard/home.html" class="mv-logo fw-bold text-success text-decoration-none fs-4">my<span>vendor</span></a>
      <div class="nav-actions">
        <a href="/dashboard/home.html" class="text-muted mx-2 fs-5"><i class="bi bi-house-door"></i></a>
        <a href="/dashboard/orders.html" class="text-muted mx-2 fs-5"><i class="bi bi-box-seam"></i></a>
        <a href="/dashboard/products.html" class="active text-success mx-2 fs-5"><i class="bi bi-grid-fill"></i></a>
      </div>
    </div>
  </nav>

  <main class="container py-4" style="max-width: 600px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold m-0">Inventory</h2>
      <a href="/dashboard/add-product.html" class="btn btn-success rounded-pill px-3 fw-bold"><i class="bi bi-plus-lg"></i> Add</a>
    </div>

    <div class="mb-3">
      <input type="text" id="searchInput" class="form-control rounded-pill px-4" placeholder="Search products...">
    </div>

    <div class="order-list" id="productList">
      </div>

    <div id="emptyState" class="text-center py-5 hidden">
      <i class="bi bi-box-seam text-muted fs-1"></i>
      <h5 class="mt-3 fw-bold">No products yet</h5>
      <p class="text-muted small">Tap 'Add' to upload your first product.</p>
    </div>
  </main>

  <div class="toast-msg" id="toastMsg">Notification</div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
