<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - myvendor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --forest:    #0d3320;
            --green:     #1a6b3c;
            --mint:      #22c55e;
            --sage:      #86efac;
            --cream:     #faf7f0;
            --cream-dark:#f0ebe0;
            --warm-white:#fffcf5;
            --text-main: #0d1f12;
            --text-mid:  #3a5c43;
            --text-soft: #6b8f72;
            --border:    #dde8de;
            --card-bg:   #ffffff;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 90px; /* Space for sticky button */
        }

        /* ── GRAIN OVERLAY ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 180px;
        }

        /* ── HEADER ── */
        .store-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--forest);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 0.9rem 0;
            overflow: hidden;
        }
        .store-header::before,
        .store-header::after {
            content: ''; position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.35; pointer-events: none;
        }
        .store-header::before { width: 260px; height: 160px; background: radial-gradient(circle, #22c55e, transparent); top: -60px; left: -40px; }
        .store-header::after { width: 200px; height: 140px; background: radial-gradient(circle, #4ade80, transparent); bottom: -70px; right: 10%; }

        .header-inner { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 1; }

        .btn-back {
            color: var(--sage);
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: color 0.2s;
        }
        .btn-back:hover { color: #fff; }

        .store-brand { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .store-wordmark { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1rem; color: #fff; line-height: 1.2; text-align: right; }
        .store-wordmark span { display: block; font-family: 'DM Sans', sans-serif; font-weight: 400; font-size: 0.55rem; color: var(--sage); letter-spacing: 0.12em; text-transform: uppercase; }

        /* ── PRODUCT HERO ── */
        .product-hero-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            margin-top: 1.5rem;
            animation: fadeUp 0.5s ease both;
        }

        .img-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--cream-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-details { padding: 1.5rem; }
        
        .product-eyebrow {
            font-size: 0.7rem; font-weight: 700; color: var(--text-soft); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.5rem;
        }
        
        .product-title {
            font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.8rem; color: var(--text-main); line-height: 1.1; margin-bottom: 0.5rem;
        }
        
        .product-price {
            font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.5rem; color: var(--green); margin-bottom: 1.5rem;
        }

        .desc-label {
            font-size: 0.85rem; font-weight: 700; color: var(--forest); margin-bottom: 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem;
        }
        .product-desc {
            font-size: 0.95rem; color: var(--text-mid); line-height: 1.6; white-space: pre-wrap;
        }

        /* ── STICKY CHECKOUT BAR ── */
        .sticky-checkout {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); padding: 1rem; border-top: 1px solid var(--border); z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
            display: flex; justify-content: center;
        }
        .btn-order {
            width: 100%; max-width: 620px; background: linear-gradient(135deg, var(--green) 0%, var(--forest) 100%);
            color: #fff; font-weight: 700; font-size: 1.1rem; padding: 1rem; border-radius: 14px; border: none;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem; box-shadow: 0 4px 12px rgba(26, 107, 60, 0.25);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-order:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(26, 107, 60, 0.35); color: #fff; }
        .btn-order:disabled { background: var(--text-soft); box-shadow: none; transform: none; cursor: not-allowed; }

        /* ── PREMIUM MODAL ── */
        .modal-content {
            background: var(--cream); border: none; border-radius: 20px; box-shadow: 0 10px 40px rgba(13,51,32,0.15);
        }
        .modal-header {
            border-bottom: 1px solid var(--border); padding: 1.5rem;
        }
        .modal-title {
            font-family: 'Playfair Display', serif; font-weight: 800; color: var(--forest);
        }
        .modal-body { padding: 1.5rem; }
        
        .form-label { font-size: 0.85rem; font-weight: 700; color: var(--text-mid); margin-bottom: 0.3rem; }
        .form-control {
            padding: 0.8rem 1rem; border-radius: 12px; border: 1.5px solid var(--border); font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem; background: var(--warm-white); color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .form-control:focus { border-color: var(--green); box-shadow: 0 0 0 3.5px rgba(26,107,60,0.12); outline: none; }
        
        @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav class="store-header">
        <div class="container header-inner" style="max-width:620px;">
            <a href="#" id="navStoreLink" class="btn-back">
                <i class="bi bi-arrow-left"></i> Back to Store
            </a>
            <div class="store-brand">
                <div class="store-wordmark">
                    <span id="navStoreName">Loading…</span>
                    <span>Official Store</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="container" style="max-width:620px;">
        <div class="product-hero-card">
            <div class="img-container" id="prodImageContainer">
                <img id="prodImage" src="" alt="Product Image" style="display: none;">
            </div>
            
            <div class="product-details">
                <div class="product-eyebrow">Product Details</div>
                <h1 class="product-title" id="prodTitle">Loading...</h1>
                <div class="product-price" id="prodPrice">₦0</div>
                
                <div class="mt-4">
                    <div class="desc-label">Description</div>
                    <div class="product-desc" id="prodDesc">Loading description...</div>
                </div>
            </div>
        </div>
    </main>

    <div class="sticky-checkout">
        <button class="btn-order" id="mainOrderBtn" data-bs-toggle="modal" data-bs-target="#checkoutModal">
            <i class="bi bi-whatsapp"></i> Order on WhatsApp
        </button>
    </div>

    <div class="modal fade" id="checkoutModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Complete Your Order</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form onsubmit="window.sendToWhatsApp(event)">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="buyerName" required placeholder="Jane Doe">
                        </div>
                        <div class="row mb-3">
                            <div class="col-4">
                                <label class="form-label">Quantity</label>
                                <input type="number" class="form-control" id="buyerQty" value="1" min="1" required>
                            </div>
                            <div class="col-8">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="buyerPhone" required placeholder="08012345678">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Delivery Address</label>
                            <textarea class="form-control" id="buyerAddress" rows="2" required placeholder="Full street address..."></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Notes (Size, Color, etc.)</label>
                            <input type="text" class="form-control" id="buyerNotes" placeholder="Optional">
                        </div>
                        <button type="submit" class="btn-order w-100" style="border-radius: 12px; padding: 0.8rem;">
                            <i class="bi bi-whatsapp"></i> Send Order to Store
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // ⚠️ IMPORTANT: Verify your actual Supabase URL and Anon Key here
        const SUPABASE_URL = 'https://sotdghhayztnpwnrzjzu.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_OcOKwSDnoCGm_rt725Bi-g_rV6tjGlK';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.currentVendor = null;
        window.currentProduct = null;

        async function initProductPage() {
            const params = new URLSearchParams(window.location.search);
            const vendorSlug = params.get('vendor');
            const productId = params.get('id');

            if (!vendorSlug || !productId) {
                document.getElementById('prodTitle').innerText = "Invalid product link";
                return;
            }

            // 1. Fetch Vendor
            const { data: vendor, error: vError } = await supabase.from('vendor_profiles').select('*').eq('slug', vendorSlug).single();
            if (vError || !vendor) { 
                document.getElementById('prodTitle').innerText = "Store not found"; 
                return; 
            }
            window.currentVendor = vendor;

            // 2. Fetch Product
            const { data: product, error: pError } = await supabase.from('products').select('*').eq('id', productId).single();
            if (pError || !product) { 
                document.getElementById('prodTitle').innerText = "Product not found"; 
                return; 
            }
            window.currentProduct = product;

            // 3. Update Premium UI
            document.title = `${product.title} - ${vendor.business_name}`;
            
            document.getElementById('navStoreLink').href = `/${vendor.slug}`;
            document.getElementById('navStoreName').innerText = vendor.business_name;
            document.getElementById('prodTitle').innerText = product.title;
            document.getElementById('prodPrice').innerText = `₦${parseFloat(product.price).toLocaleString()}`;
            document.getElementById('prodDesc').innerText = product.description || "No description provided.";
            
            if(product.image_url) {
                const imgEl = document.getElementById('prodImage');
                imgEl.src = product.image_url;
                imgEl.style.display = 'block';
            } else {
                document.getElementById('prodImageContainer').innerHTML = '<div style="font-size:4rem; color: var(--text-soft);">📦</div>';
            }

            // Check Stock Status
            if (!product.in_stock) {
                const btn = document.getElementById('mainOrderBtn');
                btn.disabled = true;
                btn.innerHTML = '<i class="bi bi-x-circle"></i> Out of Stock';
                
                // Add grayscale to image
                if (document.getElementById('prodImage')) {
                    document.getElementById('prodImage').style.filter = "grayscale(1)";
                    document.getElementById('prodImage').style.opacity = "0.8";
                }
            }

            // 🌟 TRACK PRODUCT VIEW (Background Analytics)
            supabase.from('analytics_events').insert([{
                vendor_id: window.currentVendor.id,
                product_id: window.currentProduct.id,
                event_type: 'product_view'
            }]).then();
        }

        // Send to WhatsApp Logic
        window.sendToWhatsApp = function(e) {
            e.preventDefault();

            const name = document.getElementById('buyerName').value;
            const phoneStr = document.getElementById('buyerPhone').value; // Added phone field
            const qty = document.getElementById('buyerQty').value;
            const address = document.getElementById('buyerAddress').value;
            const notes = document.getElementById('buyerNotes').value;
            const total = parseFloat(window.currentProduct.price) * parseInt(qty);

            let msg = `Hello *${window.currentVendor.business_name}*, I would like to place an order!\n\n`;
            msg += `🛒 *Item:* ${window.currentProduct.title}\n`;
            msg += `🔢 *Quantity:* ${qty}\n`;
            msg += `💰 *Total Amount:* ₦${total.toLocaleString()}\n`;
            msg += `\n*-- MY DELIVERY DETAILS --*\n`;
            msg += `👤 *Name:* ${name}\n`;
            msg += `📞 *Phone:* ${phoneStr}\n`;
            msg += `📍 *Address:* ${address}\n`;
            if(notes) msg += `📝 *Notes/Size:* ${notes}\n`;
            msg += `\n🔗 *Product Link:* ${window.location.href}`;

            // 🌟 TRACK WHATSAPP CLICK (Background Analytics)
            supabase.from('analytics_events').insert([{
                vendor_id: window.currentVendor.id,
                product_id: window.currentProduct.id,
                event_type: 'whatsapp_click'
            }]).then();

            // Redirect to vendor WhatsApp
            const vendorPhone = window.currentVendor.whatsapp_number || window.currentVendor.phone || ""; 
            const waUrl = `https://wa.me/${vendorPhone}?text=${encodeURIComponent(msg)}`;
            window.open(waUrl, '_blank');

            // Hide Modal securely
            const modalEl = document.getElementById('checkoutModal');
            if(modalEl && typeof bootstrap !== 'undefined') {
                bootstrap.Modal.getInstance(modalEl).hide();
            }
        };

        // Initialize
        initProductPage();
    </script>
</body>
</html>
