<script type="module">
  import { supabase } from '/assets/js/supabase.js';

  // 🌟 NEW: Validate and establish the recovery session on page load
  document.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const msgDiv = document.getElementById('resetMsg');
    const btn = document.getElementById('resetBtn');

    // 1. If we find a PKCE code in the URL, exchange it for a session immediately
    if (code) {
      const { error } = await supabase.auth.exchangeCodeForSession(code);
      
      if (error) {
        msgDiv.textContent = 'Recovery link expired or invalid. Please request a new one.';
        msgDiv.className = 'auth-message error show';
        btn.disabled = true;
        return;
      }
      
      // Clean up the URL so the code doesn't stay in the browser address bar
      window.history.replaceState({}, document.title, window.location.pathname);
    } else {
      // 2. If there's no code, check if a session was already established
      // (We use a tiny timeout just in case Supabase is processing a hash flow)
      setTimeout(async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
          msgDiv.textContent = 'No active recovery session found. Please request a new link.';
          msgDiv.className = 'auth-message error show';
          btn.disabled = true;
        }
      }, 500);
    }
  });

  // ─── ORIGINAL RESET LOGIC ───
  window.handleReset = async (e) => {
    e.preventDefault();

    const newPass = document.getElementById('newPassword').value;
    const confPass = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('resetBtn');
    const spinner = document.getElementById('resetSpinner');
    const label = document.getElementById('resetLabel');
    const msgDiv = document.getElementById('resetMsg');

    const showMsg = (text, type) => {
      msgDiv.textContent = text;
      msgDiv.className = `auth-message ${type} show`;
    };

    if (newPass !== confPass) {
      showMsg("Passwords do not match.", "error");
      return;
    }

    // Loading state
    btn.disabled = true;
    spinner.style.display = 'inline-block';
    label.textContent = 'Updating...';

    // The session is now guaranteed to exist because of our DOMContentLoaded check!
    const { error } = await supabase.auth.updateUser({
      password: newPass
    });

    if (error) {
      showMsg(error.message, "error");
      btn.disabled = false;
      spinner.style.display = 'none';
      label.textContent = 'Update Password';
    } else {
      showMsg("Password updated successfully! Redirecting...", "success");
      // Send them to the dashboard, they are now fully logged in with their new password
      setTimeout(() => {
        window.location.href = '/dashboard/home.html';
      }, 2000);
    }
  };
</script>
