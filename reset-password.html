<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reset Password | myvendor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&family=Raleway:wght@600..900&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green-primary: #0f6e3f; --green-bright: #22c55e; --green-dark: #0a4a2a; --green-soft: #e9f7ef;
      --gray-bg: #fafcf9; --card-white: #ffffff; --text-dark: #1a2e1f; --text-muted: #4a6741;
      --border-light: #e9eee5; --shadow-md: 0 12px 28px rgba(0, 20, 0, 0.08);
      --radius-lg: 20px; --radius-sm: 12px;
    }

    body {
      background: linear-gradient(145deg, #f6fcf5 0%, #f0f7ec 100%);
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .auth-nav { background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(34, 197, 94, 0.2); padding: 0.75rem 0; position: sticky; top: 0; z-index: 1000; }
    .nav-container { max-width: 640px; margin: 0 auto; padding: 0 1rem; text-align: center; }
    .mv-logo-modern { font-family: 'Raleway', sans-serif; font-weight: 800; font-size: 1.5rem; background: linear-gradient(135deg, var(--green-dark), var(--green-primary)); -webkit-background-clip: text; color: transparent; text-decoration: none; }
    .mv-logo-modern span { background: linear-gradient(135deg, var(--green-bright), #2b9348); -webkit-background-clip: text; color: transparent; }

    /* Main Container */
    .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
    .auth-card { max-width: 420px; width: 100%; background: var(--card-white); border-radius: var(--radius-lg); padding: 2.5rem 2rem; box-shadow: var(--shadow-md); border: 1px solid var(--border-light); animation: fadeUp 0.5s ease-out; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .auth-header { margin-bottom: 2rem; text-align: center; }
    .auth-header h1 { font-family: 'Raleway', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--green-dark); margin-bottom: 0.5rem; }
    .auth-header p { font-size: 0.85rem; color: var(--text-muted); }

    .form-group { margin-bottom: 1.2rem; }
    .form-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.4rem; display: block; }
    .input-icon-wrapper { position: relative; }
    .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem; pointer-events: none; }

    .form-control-modern { width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem; border: 1.5px solid var(--border-light); border-radius: var(--radius-sm); font-size: 0.9rem; background: var(--gray-bg); transition: all 0.2s; }
    .form-control-modern:focus { border-color: var(--green-bright); background: white; outline: none; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1); }

    .btn-submit { width: 100%; background: linear-gradient(105deg, var(--green-primary), var(--green-dark)); border: none; padding: 0.9rem; border-radius: var(--radius-sm); font-weight: 700; font-size: 0.9rem; color: white; transition: all 0.2s; margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;}
    .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.03); }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    /* Alert */
    .auth-message { padding: 0.75rem 1rem; border-radius: var(--radius-sm); font-size: 0.8rem; margin-bottom: 1.5rem; display: none; }
    .auth-message.error { background: #fee2e2; border: 1px solid #fecaca; color: #dc2626; }
    .auth-message.success { background: #dcfce7; border: 1px solid #bbf7d0; color: var(--green-dark); }
    .auth-message.show { display: block; }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255, 255, 255, 0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav class="auth-nav">
  <div class="nav-container">
    <a href="/" class="mv-logo-modern">my<span>vendor</span></a>
  </div>
</nav>

<main class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Set New Password</h1>
      <p>Please enter your new password below.</p>
    </div>

    <div id="resetMsg" class="auth-message"></div>

    <form id="resetForm" onsubmit="window.handleReset(event)">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="input-icon-wrapper">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" id="newPassword" class="form-control-modern" placeholder="Min. 8 characters" required minlength="8">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-icon-wrapper">
          <i class="bi bi-shield-lock input-icon"></i>
          <input type="password" id="confirmPassword" class="form-control-modern" placeholder="Type it again" required minlength="8">
        </div>
      </div>

      <button type="submit" id="resetBtn" class="btn-submit">
        <span id="resetSpinner" class="spinner"></span>
        <span id="resetLabel">Update Password</span>
      </button>
    </form>
  </div>
</main>

<script type="module">
  import { supabase } from '/assets/js/supabase.js';

  // 🌟 NEW: Validate and establish the recovery session on page load
  document.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const msgDiv = document.getElementById('resetMsg');
    const btn = document.getElementById('resetBtn');

    // 1. If we find a PKCE code in the URL, exchange it for a session immediately
    if (code) {
      const { error } = await supabase.auth.exchangeCodeForSession(code);
      
      if (error) {
        msgDiv.textContent = 'Recovery link expired or invalid. Please request a new one.';
        msgDiv.className = 'auth-message error show';
        btn.disabled = true;
        return;
      }
      
      // Clean up the URL so the code doesn't stay in the browser address bar
      window.history.replaceState({}, document.title, window.location.pathname);
    } else {
      // 2. If there's no code, check if a session was already established
      // (We use a tiny timeout just in case Supabase is processing a hash flow)
      setTimeout(async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
          msgDiv.textContent = 'No active recovery session found. Please request a new link.';
          msgDiv.className = 'auth-message error show';
          btn.disabled = true;
        }
      }, 500);
    }
  });

  // ─── ORIGINAL RESET LOGIC ───
  window.handleReset = async (e) => {
    e.preventDefault();

    const newPass = document.getElementById('newPassword').value;
    const confPass = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('resetBtn');
    const spinner = document.getElementById('resetSpinner');
    const label = document.getElementById('resetLabel');
    const msgDiv = document.getElementById('resetMsg');

    const showMsg = (text, type) => {
      msgDiv.textContent = text;
      msgDiv.className = `auth-message ${type} show`;
    };

    if (newPass !== confPass) {
      showMsg("Passwords do not match.", "error");
      return;
    }

    // Loading state
    btn.disabled = true;
    spinner.style.display = 'inline-block';
    label.textContent = 'Updating...';

    // The session is now guaranteed to exist because of our DOMContentLoaded check!
    const { error } = await supabase.auth.updateUser({
      password: newPass
    });

    if (error) {
      showMsg(error.message, "error");
      btn.disabled = false;
      spinner.style.display = 'none';
      label.textContent = 'Update Password';
    } else {
      showMsg("Password updated successfully! Redirecting...", "success");
      // Send them to the dashboard, they are now fully logged in with their new password
      setTimeout(() => {
        window.location.href = '/dashboard/home.html';
      }, 2000);
    }
  };
</script>

</body>
</html>
