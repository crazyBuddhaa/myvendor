<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings - myvendor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;900&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --green: #16a34a; --bg-color: #f8faf8; --border-color:#e5e7eb; }
    body { font-family: 'Open Sans', sans-serif; background: var(--bg-color); }
    .form-card { background: white; border: 1px solid var(--border-color); border-radius: 16px; padding: 1.5rem; }
    .form-control-mv { width: 100%; padding: 0.8rem; border: 1.5px solid var(--border-color); border-radius: 10px; margin-bottom: 1rem; }
    .btn-save { width: 100%; padding: 0.85rem; background: var(--green); color: white; border: none; border-radius: 10px; font-weight: 700; }
  </style>
</head>
<body>
  <nav class="p-3 border-bottom bg-white sticky-top">
    <div class="container d-flex justify-content-between align-items-center" style="max-width: 600px;">
      <a href="/dashboard/home.html" class="text-decoration-none text-dark fw-bold"><i class="bi bi-chevron-left"></i> Settings</a>
      <button class="btn btn-sm btn-outline-danger fw-bold" onclick="handleLogout()">Logout</button>
    </div>
  </nav>

  <main class="container mt-4" style="max-width: 600px;">
    <div id="settingsLoading" class="text-center py-5"><div class="spinner-border text-success"></div></div>
    
    <form id="settingsForm" class="form-card d-none" onsubmit="updateSettings(event)">
      <label class="fw-bold small mb-1">Business Name</label>
      <input type="text" id="setBizName" class="form-control-mv" required>

      <label class="fw-bold small mb-1">WhatsApp Phone Number</label>
      <input type="tel" id="setPhone" class="form-control-mv" placeholder="e.g. 2348030000000" required>
      <p class="text-muted extra-small mb-3" style="font-size: 0.7rem;">Include country code (e.g., 234 for Nigeria) without the + sign.</p>

      <label class="fw-bold small mb-1">Store Slug (Link Name)</label>
      <input type="text" id="setSlug" class="form-control-mv" disabled>
      <p class="text-muted extra-small mb-4" style="font-size: 0.7rem;">Your store link name cannot be changed currently.</p>

      <button type="submit" id="btnUpdateSettings" class="btn-save">Update Profile</button>
    </form>
  </main>
  <script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
