<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings - myvendor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* Add your standard CSS variables and styles here */
    :root { --green: #16a34a; --green-dark: #14532d; --bg-color: #f8faf8; --card-bg: #ffffff; --text-muted: #4b6b50; --border-color:#e5e7eb; }
    body { font-family: 'Open Sans', sans-serif; background-color: var(--bg-color); color: #0f1a0f; }
    .dash-nav { background: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 1rem 0; position: sticky; top: 0; z-index: 1000; }
    .btn-back { color: var(--text-muted); font-size: 0.9rem; font-weight: 700; text-decoration: none; }
    .form-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; }
    .form-label { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.3rem; }
    .form-control-mv { width: 100%; padding: 0.8rem 1rem; border: 1.5px solid var(--border-color); border-radius: 10px; font-size: 0.95rem; outline: none; margin-bottom: 1rem; background: var(--bg-color); }
    .btn-save { width: 100%; padding: 0.85rem; background: var(--green); color: white; border: none; border-radius: 10px; font-weight: 700; }
  </style>
</head>
<body>
  <nav class="dash-nav">
    <div class="container d-flex justify-content-between align-items-center" style="max-width: 600px;">
      <a href="/dashboard/home.html" class="btn-back"><i class="bi bi-arrow-left"></i> Back</a>
      <span class="fw-bold text-success">Settings</span>
    </div>
  </nav>

  <main class="container mt-4" style="max-width: 600px;">
    <h1 class="fw-bold mb-3" style="font-size: 1.4rem; color: var(--green-dark);">Store Profile</h1>
    
    <form id="settingsForm" class="form-card" onsubmit="updateSettings(event)">
      <label class="form-label">Business Name</label>
      <input type="text" id="setBizName" class="form-control-mv" required>

      <label class="form-label">Store Link (Slug)</label>
      <div class="input-group mb-3">
        <span class="input-group-text bg-light text-muted" style="border: 1.5px solid var(--border-color); border-right: none;">myvendor.qzz.io/</span>
        <input type="text" id="setSlug" class="form-control-mv mb-0" style="border-left: none; border-top-left-radius: 0; border-bottom-left-radius: 0;" required>
      </div>

      <label class="form-label">WhatsApp Number</label>
      <input type="tel" id="setWaNumber" class="form-control-mv" placeholder="e.g. 2348012345678" required>

      <label class="form-label">Store Bio</label>
      <textarea id="setBio" class="form-control-mv" rows="3" placeholder="Tell buyers about your store..."></textarea>

      <button type="submit" id="btnSaveSettings" class="btn-save mt-2">Update Profile</button>
    </form>
  </main>
  
  <script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
