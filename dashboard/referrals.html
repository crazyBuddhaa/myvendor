<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Promotions Hub | myvendor</title>

  <!-- Bootstrap 5 + Icons + Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&family=Raleway:wght@600..900&display=swap" rel="stylesheet" />
  <!-- Bootstrap JS Bundle (for modal, toasts) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green-primary: #0f6e3f; --green-bright: #22c55e; --green-dark: #0a4a2a; --green-soft: #e9f7ef;
      --gray-bg: #fafcf9; --card-white: #ffffff; --text-dark: #1a2e1f; --text-muted: #4a6741;
      --border-light: #e9eee5; --shadow-sm: 0 8px 20px rgba(0, 32, 0, 0.04);
      --wa-green: #25D366;
    }

    body { background: var(--gray-bg); font-family: 'Inter', sans-serif; color: var(--text-dark); padding-bottom: 1.5rem; }

    /* Header */
    .dashboard-header { background: var(--card-white); padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border-light); position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
    .page-title { font-family: 'Raleway', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--green-dark); margin: 0; }

    .main-container { padding: 1.5rem; max-width: 1300px; margin: 0 auto; }

    /* Cards */
    .reward-card, .promo-card, .vendor-card { background: var(--card-white); border-radius: 20px; border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); transition: transform 0.1s ease; height: 100%; }
    .reward-card { background: linear-gradient(135deg, var(--green-dark), var(--green-primary)); color: white; border: none; }
    .reward-card h2, .reward-card p { color: white; }
    .badge-future { background-color: #f59e0b; color: #2c1a00; }
    .badge-active { background-color: var(--green-bright); color: #0a2a1a; }
    .badge-upcoming { background-color: #3b82f6; color: white; }
    .link-box { display: flex; align-items: center; background: var(--gray-bg); border: 1.5px solid var(--border-light); border-radius: 12px; padding: 0.4rem; margin-bottom: 1rem; }
    .link-box input { flex: 1; background: transparent; border: none; font-size: 0.85rem; color: var(--text-muted); padding: 0.5rem; outline: none; font-family: monospace; }
    .link-box button { background: var(--green-soft); color: var(--green-dark); border: none; padding: 0.6rem 1rem; border-radius: 8px; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: 0.2s; }
    .link-box button:hover { background: var(--green-bright); color: white; }
    .btn-whatsapp { background: var(--wa-green); color: white; border: none; padding: 0.7rem; border-radius: 12px; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: 0.2s; text-decoration: none; }
    .btn-whatsapp:hover { background: #1da851; color: white; }
    .btn-outline-green { border: 1.5px solid var(--green-primary); background: transparent; color: var(--green-dark); border-radius: 40px; font-weight: 600; padding: 0.4rem 1rem; transition: 0.2s; }
    .btn-outline-green:hover { background: var(--green-primary); color: white; }
    .btn-green-solid { background: var(--green-primary); border: none; color: white; border-radius: 40px; font-weight: 600; padding: 0.5rem 1.2rem; }
    .btn-green-solid:hover { background: var(--green-dark); }

    /* stats */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .stat-box { background: rgba(255,255,255,0.12); backdrop-filter: blur(2px); border-radius: 20px; padding: 1rem; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
    .stat-box h3 { font-size: 2rem; font-weight: 800; margin: 0; color: white; }
    .stat-box p { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin: 0; opacity: 0.9; }

    /* section title */
    .section-title { font-family: 'Raleway', sans-serif; font-weight: 800; font-size: 1.3rem; color: var(--green-dark); margin-bottom: 1rem; border-left: 5px solid var(--green-primary); padding-left: 0.8rem; }

    /* vendor promo cards */
    .vendor-card .card-footer { background: transparent; border-top: 1px solid var(--border-light); padding: 0.8rem 1rem; }
    .badge-status { font-size: 0.7rem; font-weight: 600; padding: 0.25rem 0.6rem; border-radius: 40px; }
    .toast-modern { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(40px); background: #1e2f1c; color: white; padding: 0.7rem 1.5rem; border-radius: 60px; font-weight: 600; font-size: 0.8rem; opacity: 0; transition: transform 0.25s ease, opacity 0.2s; z-index: 2000; pointer-events: none; }
    .toast-modern.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .referral-simulate { background: rgba(255,255,255,0.2); border-radius: 60px; padding: 0.3rem 1rem; font-size: 0.75rem; cursor: pointer; display: inline-block; transition: 0.2s; }
    .referral-simulate:hover { background: rgba(255,255,255,0.4); }
    hr { opacity: 0.3; }
  </style>
</head>
<body>

<header class="dashboard-header">
  <h1 class="page-title"><i class="bi bi-megaphone"></i> Promotions Hub</h1>
</header>

<main class="main-container">
  <!-- REFERRAL REWARDS SECTION (Active Promotion Highlight) -->
  <div class="reward-card p-4 mb-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center">
      <div>
        <h2 class="mb-1">🎁 Refer & Earn</h2>
        <p class="mb-2">Invite fellow vendors → each signup gives you <strong>+3 product slots</strong>. Unlimited rewards!</p>
        <div class="stats-grid mt-3" style="max-width: 280px;">
          <div class="stat-box"><h3 id="statTotalLimit">20</h3><p>Total Limit</p></div>
          <div class="stat-box"><h3 id="statBonusSlots">0</h3><p>Bonus Slots</p></div>
        </div>
        <div class="mt-2">
          <span class="referral-simulate" id="simulateReferralBtn"><i class="bi bi-person-plus"></i> + Simulate a referral</span>
        </div>
      </div>
      <div style="min-width: 260px;" class="mt-3 mt-md-0">
        <div class="link-box">
          <input type="text" id="referralLinkInput" readonly value="loading...">
          <button id="copyBtn">Copy</button>
        </div>
        <a href="#" id="waShareBtn" class="btn-whatsapp" target="_blank">
          <i class="bi bi-whatsapp"></i> Share on WhatsApp
        </a>
      </div>
    </div>
  </div>

  <!-- PLATFORM PROMOTIONS (current & future) - Referral included as active -->
  <div class="mb-5">
    <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
      <div class="section-title mb-0">🏆 Platform Promotions</div>
      <span class="badge bg-light text-muted p-2"><i class="bi bi-calendar-check"></i> Active + Upcoming</span>
    </div>
    <div class="row g-4" id="platformPromosContainer"></div>
  </div>

  <!-- VENDOR INITIATED PROMOTIONS (Create & Manage) -->
  <div class="mb-5">
    <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
      <div class="section-title mb-0">✨ My Promotions (Vendor Created)</div>
      <button class="btn-green-solid btn" data-bs-toggle="modal" data-bs-target="#createPromoModal"><i class="bi bi-plus-lg"></i> New Promotion</button>
    </div>
    <div class="row g-4" id="vendorPromosContainer"></div>
  </div>
</main>

<div id="toastMsg" class="toast-modern">Copied!</div>

<!-- Modal: Create Vendor Promotion -->
<div class="modal fade" id="createPromoModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius: 24px; border: none;">
      <div class="modal-header border-0" style="padding: 1.5rem 1.5rem 0 1.5rem;">
        <h5 class="modal-title fw-bold" style="color: var(--green-dark);">🚀 Create your promotion</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" style="padding: 1.5rem;">
        <form id="createPromoForm">
          <div class="mb-3">
            <label class="form-label fw-semibold">Promotion title</label>
            <input type="text" class="form-control" id="promoTitle" placeholder="e.g., Weekend Flash Sale" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description / Offer</label>
            <textarea class="form-control" rows="2" id="promoDesc" placeholder="20% off all orders, BOGO, etc." required></textarea>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Start Date</label>
              <input type="date" class="form-control" id="promoStartDate" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">End Date</label>
              <input type="date" class="form-control" id="promoEndDate" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Discount value (optional)</label>
            <input type="text" class="form-control" id="promoDiscount" placeholder="e.g., 15% OFF or Free shipping">
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="promoActive" checked>
            <label class="form-check-label">Set as active immediately</label>
          </div>
          <button type="submit" class="btn btn-success w-100 py-2" style="background: var(--green-primary); border: none;">➕ Add Promotion</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  // ---------- STORAGE KEYS ----------
  const REFERRAL_COUNT_KEY = "myvendor_referral_count";
  const VENDOR_PROMOS_KEY = "myvendor_vendor_promos";
  const VENDOR_ID_KEY = "myvendor_vendor_id";

  // ---------- UTILITIES ----------
  function showToast(message) {
    const toast = document.getElementById("toastMsg");
    toast.textContent = message;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
  }

  // Get vendor unique ref id (simulate)
  function getVendorRefId() {
    let vid = localStorage.getItem(VENDOR_ID_KEY);
    if (!vid) {
      vid = "VENDOR" + Math.floor(Math.random() * 90000 + 10000);
      localStorage.setItem(VENDOR_ID_KEY, vid);
    }
    return vid;
  }

  // Referral logic: total bonus = referredCount * 3
  function getReferredCount() {
    let count = localStorage.getItem(REFERRAL_COUNT_KEY);
    if (count === null) {
      // default 2 referred vendors to show initial bonus
      localStorage.setItem(REFERRAL_COUNT_KEY, "2");
      return 2;
    }
    return parseInt(count, 10);
  }

  function updateReferralStats() {
    const referred = getReferredCount();
    const bonus = referred * 3;
    const baseLimit = 20;
    const total = baseLimit + bonus;
    document.getElementById("statTotalLimit").innerText = total;
    document.getElementById("statBonusSlots").innerText = bonus;
    return { referred, bonus, total };
  }

  // Build referral link (simulate)
  function buildReferralLink() {
    const vendorRef = getVendorRefId();
    return `https://myvendor.com/join?ref=${vendorRef}`;
  }

  function updateReferralLinkUI() {
    const link = buildReferralLink();
    const inputField = document.getElementById("referralLinkInput");
    if (inputField) inputField.value = link;
    const waBtn = document.getElementById("waShareBtn");
    const text = `🚀 Grow your business! Join myvendor using my referral link and start selling. Get exclusive benefits: ${link}`;
    waBtn.href = `https://wa.me/?text=${encodeURIComponent(text)}`;
  }

  function copyReferralLink() {
    const linkInput = document.getElementById("referralLinkInput");
    if (!linkInput) return;
    linkInput.select();
    navigator.clipboard.writeText(linkInput.value);
    showToast("✅ Referral link copied!");
  }

  // simulate new referral (demo)
  function simulateReferral() {
    let current = getReferredCount();
    current += 1;
    localStorage.setItem(REFERRAL_COUNT_KEY, current);
    updateReferralStats();
    showToast(`🎉 +1 new referral! You earned +3 product slots. Total bonus: ${current * 3} slots`);
  }

  // ---------- PLATFORM PROMOTIONS (including Referral as active) ----------
  const platformPromotions = [
    { id: "p1", title: "🎯 Referral Rewards (Active Now)", description: "Invite other vendors using your unique link. Each successful signup grants you +3 permanent product slots. No cap, unlimited stacking!", type: "platform", status: "active", badge: "active", startDate: "2025-01-01", endDate: null, future: false },
    { id: "p2", title: "🔥 New Vendor Boost", description: "List your first 5 products and get featured on homepage for 3 days. Automatically applied.", status: "active", badge: "active", future: false, endDate: null },
    { id: "p3", title: "⭐ Product Milestone Rewards", description: "Reach 20 active products → unlock 1000 promotional credits + free social spotlight.", status: "active", badge: "active", future: false },
    { id: "p4", title: "☀️ Summer Slot Surge", description: "June 1 – Aug 31: All vendors receive +5 temporary product slots. Boost your catalog!", status: "upcoming", badge: "upcoming", startDate: "2026-06-01", endDate: "2026-08-31", future: true },
    { id: "p5", title: "🏅 Festive Gold Rush", description: "Dec 2025: Double referral rewards (6 slots per referral) and featured store badges.", status: "upcoming", badge: "upcoming", startDate: "2025-12-01", endDate: "2025-12-31", future: true },
    { id: "p6", title: "💎 Premium Launch Promo", description: "Subscribe to annual plan before Q4 and get 2 months free + extra 10 product slots.", status: "active", badge: "active", future: false }
  ];

  function renderPlatformPromotions() {
    const container = document.getElementById("platformPromosContainer");
    if (!container) return;
    container.innerHTML = "";
    platformPromotions.forEach(promo => {
      const badgeClass = promo.badge === "active" ? "badge-active" : "badge-upcoming";
      const badgeText = promo.status === "active" ? "Active Now" : "Upcoming";
      const futureFlag = promo.future ? '<i class="bi bi-clock-history"></i> Future' : '<i class="bi bi-calendar-check"></i> Ongoing';
      const col = document.createElement("div");
      col.className = "col-md-6 col-lg-4";
      col.innerHTML = `
        <div class="promo-card p-3 h-100 d-flex flex-column">
          <div class="d-flex justify-content-between align-items-start">
            <h5 class="fw-bold" style="color: var(--green-dark);">${promo.title}</h5>
            <span class="badge ${badgeClass} px-2 py-1">${badgeText}</span>
          </div>
          <p class="text-muted mt-2 small" style="font-size:0.85rem;">${promo.description}</p>
          <div class="mt-auto pt-2">
            <div class="d-flex justify-content-between align-items-center">
              <span class="small text-muted"><i class="bi bi-tag"></i> ${futureFlag}</span>
              ${promo.startDate ? `<span class="small text-muted"><i class="bi bi-calendar-range"></i> ${promo.startDate}${promo.endDate ? ' → '+promo.endDate : ''}</span>` : ''}
            </div>
          </div>
        </div>
      `;
      container.appendChild(col);
    });
  }

  // ---------- VENDOR PROMOTIONS (CRUD) ----------
  function getVendorPromotions() {
    const stored = localStorage.getItem(VENDOR_PROMOS_KEY);
    if (stored) {
      return JSON.parse(stored);
    } else {
      // sample vendor-initiated promotions
      const defaultPromos = [
        { id: "v1", title: "🍃 Spring Sale", description: "15% off on all organic products", discount: "15% OFF", startDate: "2025-04-01", endDate: "2025-04-30", active: true, createdAt: Date.now() },
        { id: "v2", title: "BOGO Free", description: "Buy 1 Get 1 Free on selected spices", discount: "BOGO", startDate: "2025-03-10", endDate: "2025-03-25", active: true, createdAt: Date.now() },
        { id: "v3", title: "Flash Weekend", description: "Extra 10% off for orders above $50", discount: "10% EXTRA", startDate: "2025-03-15", endDate: "2025-03-17", active: false, createdAt: Date.now() },
        { id: "v4", title: "Referral Loyalty", description: "Customers who refer friends get $5 store credit", discount: "$5 credit", startDate: "2025-03-20", endDate: "2025-04-20", active: true, createdAt: Date.now() }
      ];
      localStorage.setItem(VENDOR_PROMOS_KEY, JSON.stringify(defaultPromos));
      return defaultPromos;
    }
  }

  function saveVendorPromotions(promos) {
    localStorage.setItem(VENDOR_PROMOS_KEY, JSON.stringify(promos));
    renderVendorPromotions();
  }

  function deleteVendorPromotion(promoId) {
    let promos = getVendorPromotions();
    promos = promos.filter(p => p.id !== promoId);
    saveVendorPromotions(promos);
    showToast("🗑️ Promotion removed");
  }

  function togglePromotionStatus(promoId) {
    let promos = getVendorPromotions();
    const promo = promos.find(p => p.id === promoId);
    if (promo) {
      promo.active = !promo.active;
      saveVendorPromotions(promos);
      showToast(promo.active ? "✅ Promotion activated" : "⏸️ Promotion deactivated");
    }
  }

  function addNewVendorPromotion(event) {
    event.preventDefault();
    const title = document.getElementById("promoTitle").value.trim();
    const description = document.getElementById("promoDesc").value.trim();
    const startDate = document.getElementById("promoStartDate").value;
    const endDate = document.getElementById("promoEndDate").value;
    const discount = document.getElementById("promoDiscount").value.trim() || "Special offer";
    const active = document.getElementById("promoActive").checked;

    if (!title || !description || !startDate || !endDate) {
      showToast("⚠️ Please fill all required fields (title, description, dates)");
      return;
    }
    if (new Date(startDate) > new Date(endDate)) {
      showToast("📅 End date must be after start date");
      return;
    }
    const newPromo = {
      id: "v_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
      title,
      description,
      discount,
      startDate,
      endDate,
      active,
      createdAt: Date.now()
    };
    const promos = getVendorPromotions();
    promos.unshift(newPromo);
    saveVendorPromotions(promos);
    // reset modal and close
    document.getElementById("createPromoForm").reset();
    const modal = bootstrap.Modal.getInstance(document.getElementById("createPromoModal"));
    if (modal) modal.hide();
    showToast("🎉 New promotion created!");
  }

  function renderVendorPromotions() {
    const container = document.getElementById("vendorPromosContainer");
    if (!container) return;
    const promos = getVendorPromotions();
    if (promos.length === 0) {
      container.innerHTML = `<div class="col-12 text-center p-5 bg-white rounded-4 border"><i class="bi bi-megaphone fs-1 text-muted"></i><p class="mt-2">No vendor promotions yet. Click "New Promotion" to create your first deal.</p></div>`;
      return;
    }
    container.innerHTML = "";
    promos.forEach(promo => {
      const isActive = promo.active;
      const statusBadge = isActive ? '<span class="badge bg-success">Active</span>' : '<span class="badge bg-secondary">Inactive</span>';
      const dateRange = `${promo.startDate} → ${promo.endDate}`;
      const today = new Date().toISOString().slice(0,10);
      const isFuture = promo.startDate > today;
      const futureChip = isFuture ? '<span class="badge bg-warning text-dark ms-1">Scheduled</span>' : '';
      const col = document.createElement("div");
      col.className = "col-md-6 col-lg-4";
      col.innerHTML = `
        <div class="vendor-card p-0 d-flex flex-column h-100">
          <div class="p-3 pb-2">
            <div class="d-flex justify-content-between align-items-start">
              <h5 class="fw-bold" style="color: var(--green-dark);">${escapeHtml(promo.title)} ${futureChip}</h5>
              ${statusBadge}
            </div>
            <p class="small text-muted mt-2">${escapeHtml(promo.description)}</p>
            ${promo.discount ? `<div class="mt-1"><span class="badge bg-light text-dark border"><i class="bi bi-percent"></i> ${escapeHtml(promo.discount)}</span></div>` : ''}
            <div class="mt-2 small text-secondary"><i class="bi bi-calendar-week"></i> ${dateRange}</div>
          </div>
          <div class="card-footer bg-transparent d-flex justify-content-between gap-2 mt-auto">
            <button class="btn btn-sm btn-outline-success toggle-status-btn" data-id="${promo.id}">${isActive ? 'Deactivate' : 'Activate'}</button>
            <button class="btn btn-sm btn-outline-danger delete-promo-btn" data-id="${promo.id}"><i class="bi bi-trash3"></i> Delete</button>
          </div>
        </div>
      `;
      container.appendChild(col);
    });
    // attach dynamic events
    document.querySelectorAll(".toggle-status-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = btn.getAttribute("data-id");
        togglePromotionStatus(id);
      });
    });
    document.querySelectorAll(".delete-promo-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = btn.getAttribute("data-id");
        if (confirm("Delete this promotion?")) deleteVendorPromotion(id);
      });
    });
  }

  function escapeHtml(str) { 
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if(m === '&') return '&amp;';
      if(m === '<') return '&lt;';
      if(m === '>') return '&gt;';
      return m;
    });
  }

  // ---------- INITIALIZE PAGE ----------
  function init() {
    updateReferralStats();
    updateReferralLinkUI();
    renderPlatformPromotions();
    renderVendorPromotions();

    // event listeners
    const copyBtn = document.getElementById("copyBtn");
    if (copyBtn) copyBtn.addEventListener("click", copyReferralLink);
    const simulateBtn = document.getElementById("simulateReferralBtn");
    if (simulateBtn) simulateBtn.addEventListener("click", () => { simulateReferral(); updateReferralLinkUI(); });
    const promoForm = document.getElementById("createPromoForm");
    if (promoForm) promoForm.addEventListener("submit", addNewVendorPromotion);
    // re-sync on storage events
    window.addEventListener("storage", (e) => {
      if (e.key === REFERRAL_COUNT_KEY) {
        updateReferralStats();
        updateReferralLinkUI();
      }
      if (e.key === VENDOR_PROMOS_KEY) renderVendorPromotions();
    });
  }

  init();
</script>
</body>
</html>
