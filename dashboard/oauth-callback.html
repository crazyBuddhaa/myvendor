<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in… — myvendor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #f6fcf5, #f0f7ec); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
    .box { text-align: center; max-width: 300px; padding: 1rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid #c6e6d4; border-top-color: #0f6e3f; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1.2rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #4a6741; font-size: 0.9rem; font-weight: 500; margin: 0; }
    .err { color: #dc2626; font-size: 0.82rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spinner"></div>
  <p id="msg">Finishing sign-in…</p>
  <p class="err" id="errMsg"></p>
</div>

<script type="module">
  import { supabase } from '/assets/js/supabase.js';

  // Check if Supabase returned an error in the URL hash (e.g. access_denied)
  const hash = new URLSearchParams(window.location.hash.replace('#', ''));
  const hashError = hash.get('error_description') || hash.get('error');
  if (hashError) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').textContent = 'Sign-in failed.';
    document.getElementById('errMsg').textContent = hashError;
    setTimeout(() => { window.location.href = '/dashboard/index.html'; }, 3000);
    throw new Error(hashError);
  }

  async function routeUser(session) {
    const { data: profile } = await supabase
      .from('vendor_profiles')
      .select('id, slug')
      .eq('id', session.user.id)
      .maybeSingle();

    if (profile && profile.slug) {
      window.location.href = '/dashboard/home.html';
    } else {
      window.location.href = '/dashboard/onboarding.html';
    }
  }

  // Timeout — if nothing resolves in 12 s, send them back to login
  const timeout = setTimeout(() => {
    window.location.href = '/dashboard/index.html?oauth=error';
  }, 12000);

  // Primary: listen for the SIGNED_IN event Supabase fires after
  // exchanging the OAuth tokens from the URL fragment
  const { data: { subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      clearTimeout(timeout);
      subscription.unsubscribe();
      await routeUser(session);
    }
  });

  // Fallback: session may already be set if the client initialised fast enough
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    clearTimeout(timeout);
    subscription.unsubscribe();
    await routeUser(session);
  }
</script>
</body>
</html>
