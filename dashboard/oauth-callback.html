<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signing in… — myvendor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #f6fcf5, #f0f7ec); min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
    .box { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #c6e6d4; border-top-color: #0f6e3f; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1.2rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #4a6741; font-size: 0.9rem; font-weight: 500; margin: 0; }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>Finishing sign-in…</p>
</div>

<script type="module">
  import { supabase } from '/assets/js/supabase.js';

  async function handleCallback() {
    // Supabase writes the session from the URL fragment automatically;
    // getSession() picks it up once the client initialises.
    const { data: { session }, error } = await supabase.auth.getSession();

    if (error || !session) {
      window.location.href = '/dashboard/index.html?oauth=error';
      return;
    }

    // Check whether this user already has a vendor profile with a slug
    const { data: profile } = await supabase
      .from('vendor_profiles')
      .select('id, slug')
      .eq('id', session.user.id)
      .maybeSingle();

    if (profile && profile.slug) {
      // Existing vendor — go straight to dashboard
      window.location.href = '/dashboard/home.html';
    } else {
      // New Google user — needs to complete store setup
      window.location.href = '/dashboard/onboarding.html';
    }
  }

  handleCallback();
</script>
</body>
</html>
