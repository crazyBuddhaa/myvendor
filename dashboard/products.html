<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Inventory | myvendor — Manage Products</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Raleway:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/dashboard.css" />

  <style>
    /* Header */
    .inventory-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .inventory-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(125deg, #14532d, #2b6e3c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0;
    }

    .btn-add-modern {
      background: linear-gradient(105deg, var(--green-primary), var(--green-dark));
      border: none;
      padding: 0.7rem 1.2rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.85rem;
      color: white;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
      text-decoration: none;
    }

    .btn-add-modern:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
      color: white;
    }

    /* Search & Toggles */
    .search-wrapper {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 0.8rem 1rem 0.8rem 2.7rem;
      border: 1.5px solid var(--border-light);
      border-radius: 60px;
      font-size: 0.9rem;
      background: var(--card-white);
      transition: all 0.2s;
      font-weight: 500;
    }

    #searchInput:focus {
      outline: none;
      border-color: var(--green-bright);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.1);
    }

    /* View Toggles */
    .view-toggles {
      background: var(--card-white);
      border: 1.5px solid var(--border-light);
      border-radius: 60px;
      display: flex;
      align-items: center;
      padding: 0.25rem;
    }
    
    .view-btn {
      background: transparent;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
    }
    
    .view-btn.active {
      background: var(--green-soft);
      color: var(--green-primary);
    }

    /* Product grid (Default) */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    /* Product list view (Toggled via JS) */
    .product-list-view {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .product-list-view .product-card {
      flex-direction: row;
      align-items: stretch;
    }
    .product-list-view .product-image {
      width: 120px;
      height: auto;
      flex-shrink: 0;
      border-radius: var(--radius-md) 0 0 var(--radius-md);
      border-right: 1px solid var(--border-light);
    }
    .product-list-view .product-info {
      padding: 0.8rem 1rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
    }
    .product-list-view .product-actions {
      margin-top: auto;
      padding-top: 0.5rem;
    }

    /* Product card */
    .product-card {
      background: var(--card-white);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
      border: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .product-image {
      aspect-ratio: 1 / 1;
      background: var(--gray-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-image .placeholder-icon {
      font-size: 2rem;
      color: var(--text-muted);
      opacity: 0.5;
    }

    .product-info {
      padding: 0.8rem;
      flex: 1;
    }

    .product-title {
      font-weight: 700;
      font-size: 0.85rem;
      line-height: 1.3;
      color: var(--text-dark);
      margin-bottom: 0.3rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-price {
      font-weight: 800;
      font-size: 0.9rem;
      color: var(--green-primary);
      margin-bottom: 0.4rem;
    }

    .stock-badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 30px;
      display: inline-block;
      margin-bottom: 0.6rem;
    }

    .stock-in {
      background: var(--green-soft);
      color: var(--green-dark);
    }

    .stock-low {
      background: #fef3c7;
      color: #b45309;
    }

    .stock-out {
      background: var(--danger-soft);
      color: var(--danger);
    }

    .product-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
      border-top: 1px solid var(--border-light);
      padding-top: 0.6rem;
    }

    .action-btn {
      flex: 1;
      padding: 0.4rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--gray-bg);
      color: var(--text-muted);
      border: 1px solid var(--border-light);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }

    .action-btn:hover {
      background: var(--green-soft);
      border-color: var(--green-bright);
      color: var(--green-dark);
    }

    .action-btn.delete:hover {
      background: var(--danger-soft);
      border-color: var(--danger);
      color: var(--danger);
    }

    /* Loading state */
    .loading-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 2rem;
    }

    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-light);
      border-top-color: var(--green-bright);
      border-radius: 50%;
      margin: 0 auto 0.8rem;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Empty state */
    .empty-state-modern {
      text-align: center;
      padding: 2rem 1rem;
      background: var(--card-white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      margin-top: 1rem;
    }

    .empty-state-modern i {
      font-size: 3rem;
      color: var(--text-muted);
      opacity: 0.5;
      margin-bottom: 1rem;
    }

    .empty-state-modern h3 {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 0.3rem;
    }

    /* Toast */
    .toast-modern {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: #1e2f1c;
      backdrop-filter: blur(8px);
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.8rem;
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.2s;
      z-index: 2000;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast-modern.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    footer {
      margin-top: auto;
      text-align: center;
      padding: 1.2rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      border-top: 1px solid rgba(34, 197, 94, 0.2);
    }

    .hidden {
      display: none !important;
    }

    /* Bulk-select mode */
    .bulk-toolbar {
      display: none;
      align-items: center;
      gap: .6rem;
      background: var(--green-soft);
      border: 1.5px solid var(--green-bright);
      border-radius: var(--radius-md);
      padding: .7rem 1rem;
      margin-bottom: 1rem;
    }
    .bulk-toolbar.visible { display: flex; }
    .bulk-count { font-weight: 700; font-size: .82rem; color: var(--green-dark); flex: 1; }
    .bulk-btn {
      padding: .38rem .85rem;
      border-radius: 30px;
      font-size: .72rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .bulk-btn-danger { background: var(--danger-soft); color: var(--danger); }
    .bulk-btn-stock  { background: white; color: var(--green-dark); border: 1.5px solid var(--green-bright); }
    .bulk-btn-out    { background: white; color: var(--text-muted); border: 1.5px solid var(--border-light); }
    .product-card.bulk-selected { outline: 2.5px solid var(--green-bright); outline-offset: -2px; }
    #productGrid.select-mode .product-card { cursor: pointer; }
    #productGrid.select-mode .product-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: transparent;
    }

    @media (max-width: 500px) {
      .product-grid {
        gap: 0.8rem;
      }
      .product-title {
        font-size: 0.75rem;
      }
      .product-price {
        font-size: 0.8rem;
      }
      .action-btn {
        font-size: 0.65rem;
        padding: 0.35rem;
      }
      .inventory-header h1 {
        font-size: 1.5rem;
      }
      .product-list-view .product-image {
        width: 100px;
      }
    }
  </style>
</head>
<body>

<nav class="inventory-nav">
  <div class="nav-container">
    <a href="/dashboard/home.html" class="mv-logo-modern">my<span>vendor</span></a>
    <div class="nav-actions-modern">
      <a href="/dashboard/home.html"><i class="bi bi-house-door"></i><span class="visually-hidden">Home</span></a>
      <a href="/dashboard/orders.html"><i class="bi bi-box-seam"></i><span class="visually-hidden">Orders</span></a>
      <a href="/dashboard/products.html" class="active"><i class="bi bi-grid-3x3-gap-fill"></i><span class="visually-hidden">Products</span></a>
    </div>
  </div>
</nav>

<main class="inventory-container">
  <div class="inventory-header">
    <h1>Inventory <i class="bi bi-box-seam text-success"></i></h1>
    <div style="display:flex;gap:.5rem;align-items:center;">
      <button id="btnSelectMode" class="btn-add-modern" style="background:white;border:1.5px solid var(--border-light);color:var(--text-muted);box-shadow:none;" onclick="toggleSelectMode()">
        <i class="bi bi-check2-square"></i> Select
      </button>
      <a href="/dashboard/add-product.html" class="btn-add-modern">
        <i class="bi bi-plus-circle"></i> Add Product
      </a>
    </div>
  </div>

  <div id="slotUsageBar" style="display:none; margin-bottom:1rem;"></div>

  <div id="bulkToolbar" class="bulk-toolbar">
    <span class="bulk-count" id="bulkCount">0 selected</span>
    <button class="bulk-btn bulk-btn-stock" onclick="bulkSetStock(true)"><i class="bi bi-check-circle me-1"></i>In Stock</button>
    <button class="bulk-btn bulk-btn-out"   onclick="bulkSetStock(false)"><i class="bi bi-slash-circle me-1"></i>Sold Out</button>
    <button class="bulk-btn bulk-btn-danger" onclick="bulkDelete()"><i class="bi bi-trash me-1"></i>Delete</button>
  </div>

  <div class="d-flex gap-2 mb-4">
    <div class="search-wrapper mb-0 flex-grow-1">
      <i class="bi bi-search search-icon"></i>
      <input type="text" id="searchInput" placeholder="Search by product name..." autocomplete="off">
    </div>
    
    <div class="view-toggles">
      <button class="view-btn active" id="btnGrid" onclick="setView('grid')">
        <i class="bi bi-grid-fill"></i>
      </button>
      <button class="view-btn" id="btnList" onclick="setView('list')">
        <i class="bi bi-list-ul"></i>
      </button>
    </div>
  </div>

  <div id="productGrid" class="product-grid">
    <div class="loading-state">
      <div class="loader"></div>
      <span>Loading your products...</span>
    </div>
  </div>

  <div id="emptyState" class="empty-state-modern hidden">
    <i class="bi bi-box-seam"></i>
    <h3>Your inventory is empty</h3>
    <p class="text-muted" style="font-size: 0.8rem;">Add your first product to start selling.</p>
    <a href="/dashboard/add-product.html" class="btn-add-modern mt-2" style="display: inline-flex;">Add Product</a>
  </div>
</main>

<footer>
  © 2026 myvendor &nbsp;·&nbsp; <a href="#" style="color: var(--green-primary); text-decoration: none;">Help Center</a> &nbsp;·&nbsp; <a href="/terms.html" style="color: var(--green-primary); text-decoration: none;">Terms</a>
</footer>

<div id="toastMsg" class="toast-modern">Notification</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/assets/js/dashboard.js"></script>

<script>
  // ─── SEARCH FUNCTIONALITY ───
  function setupSearch() {
    const searchInput = document.getElementById('searchInput');
    if (!searchInput) return;

    searchInput.addEventListener('input', function(e) {
      const term = e.target.value.toLowerCase().trim();
      const productCards = document.querySelectorAll('#productGrid .product-card');
      let visibleCount = 0;

      productCards.forEach(card => {
        const titleElem = card.querySelector('.product-title');
        if (titleElem) {
          const title = titleElem.innerText.toLowerCase();
          if (title.includes(term)) {
            card.style.display = '';
            visibleCount++;
          } else {
            card.style.display = 'none';
          }
        }
      });

      // Show/hide empty state
      const emptyState = document.getElementById('emptyState');
      const totalProducts = productCards.length;

      if (visibleCount === 0 && totalProducts > 0) {
        emptyState.classList.remove('hidden');
        emptyState.querySelector('h3').innerText = 'No matching products';
        emptyState.querySelector('p').innerText = 'Try a different search term.';
        const addBtn = emptyState.querySelector('.btn-add-modern');
        if (addBtn) addBtn.classList.add('hidden');
      } else if (totalProducts === 0) {
        emptyState.classList.remove('hidden');
        emptyState.querySelector('h3').innerText = 'Your inventory is empty';
        emptyState.querySelector('p').innerText = 'Add your first product to start selling.';
        const addBtn = emptyState.querySelector('.btn-add-modern');
        if (addBtn) addBtn.classList.remove('hidden');
      } else {
        emptyState.classList.add('hidden');
      }
    });
  }

  // Observe for when product grid is populated by dashboard.js
  const observer = new MutationObserver(function(mutations) {
    if (document.querySelector('#productGrid .product-card')) {
      setupSearch();
      observer.disconnect();
    }
  });
  observer.observe(document.getElementById('productGrid'), { childList: true, subtree: true });

  // ─── GRID / LIST VIEW TOGGLE ───
  window.setView = function(view) {
    const grid = document.getElementById('productGrid');
    const btnGrid = document.getElementById('btnGrid');
    const btnList = document.getElementById('btnList');
    
    if (view === 'list') {
      grid.classList.remove('product-grid');
      grid.classList.add('product-list-view');
      btnGrid.classList.remove('active');
      btnList.classList.add('active');
    } else {
      grid.classList.add('product-grid');
      grid.classList.remove('product-list-view');
      btnGrid.classList.add('active');
      btnList.classList.remove('active');
    }
    
    // Save preference so it remembers for next time
    localStorage.setItem('inventoryView', view);
  };

  // Check saved preference on page load
  document.addEventListener('DOMContentLoaded', () => {
    const savedView = localStorage.getItem('inventoryView') || 'grid';
    // We wrap this in a short timeout to ensure the grid has rendered if dashboard.js is fast
    setTimeout(() => {
        setView(savedView);
    }, 50);
  });
</script>

</body>
</html>
