<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory - myvendor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --green:       #16a34a;
      --green-dark:  #14532d;
      --green-light: #dcfce7;
      --bg-color:    #f8faf8;
      --card-bg:     #ffffff;
      --text-main:   #0f1a0f;
      --text-muted:  #4b6b50;
      --border-color:#e5e7eb;
      --danger:      #ef4444;
      --danger-light:#fee2e2;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    h1, h2, h3, h4, h5 { font-family: 'Raleway', sans-serif; }

    /* ─── NAVBAR ─────────────────────────────────────────── */
    .dash-nav {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .mv-logo {
      font-family: 'Raleway', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--green-dark);
      text-decoration: none;
    }
    .mv-logo span { color: var(--green); }
    
    .nav-actions a {
      color: var(--text-muted);
      font-size: 1.2rem;
      text-decoration: none;
      margin-left: 1rem;
    }
    .nav-actions a:hover, .nav-actions a.active { color: var(--green); }

    /* ─── HEADER & SEARCH ────────────────────────────────── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    
    .btn-add {
      background: var(--green);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.2s;
    }
    .btn-add:hover { background: var(--green-dark); color: white; }

    .search-input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      border-radius: 10px;
      border: 1.5px solid var(--border-color);
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
      outline: none;
      background: var(--card-bg);
    }
    .search-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(22,197,94,0.15);
    }
    .search-wrapper { position: relative; }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    /* ─── PRODUCT LIST & EMPTY STATE ─────────────────────── */
    .product-list { display: flex; flex-direction: column; gap: 12px; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      background: var(--card-bg);
      border-radius: 16px;
      border: 1px dashed var(--border-color);
    }
    .empty-icon { font-size: 2.5rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .empty-title { font-size: 1.1rem; font-weight: 800; color: var(--green-dark); }

    /* ─── FOOTER & TOAST ─────────────────────────────────── */
    .dashboard-footer {
      margin-top: auto;
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border-color);
      background: var(--bg-color);
    }
    .dashboard-footer a { color: var(--green); text-decoration: none; font-weight: 600; }

    .toast-msg {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--text-main); color: white; padding: 0.6rem 1.2rem;
      border-radius: 50px; font-size: 0.85rem; font-weight: 600;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 2000; opacity: 0; pointer-events: none;
    }
    .toast-msg.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <nav class="dash-nav">
    <div class="container max-w-md mx-auto d-flex justify-content-between align-items-center" style="max-width: 600px;">
      <a href="/dashboard/home.html" class="mv-logo">my<span>vendor</span></a>
      <div class="nav-actions">
        <a href="/dashboard/home.html"><i class="bi bi-house-door"></i></a>
        <a href="/dashboard/orders.html"><i class="bi bi-box-seam"></i></a>
        <a href="/dashboard/products.html" class="active"><i class="bi bi-grid-fill"></i></a>
      </div>
    </div>
  </nav>

  <main class="container max-w-md mx-auto mt-4 flex-grow-1" style="max-width: 600px;">
    
    <div class="page-header">
      <h1 style="font-size: 1.4rem; font-weight: 800; color: var(--green-dark); margin: 0;">Inventory</h1>
      <a href="/dashboard/add-product.html" class="btn-add">
        <i class="bi bi-plus-lg"></i> Add Product
      </a>
    </div>

    <div class="search-wrapper">
      <i class="bi bi-search search-icon"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search products...">
    </div>

    <div class="product-list" id="productList">
    </div>

    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon"><i class="bi bi-box-seam"></i></div>
      <div class="empty-title" id="emptyTitle">Your store is empty</div>
      <p class="text-muted" id="emptyDesc" style="font-size: 0.85rem; margin-bottom: 1.5rem;">Add your first product to start selling.</p>
      <a href="/dashboard/add-product.html" class="btn-add" id="emptyAddBtn">
        <i class="bi bi-plus-lg"></i> Add Product
      </a>
    </div>

  </main>

  <footer class="dashboard-footer">
    <div class="container max-w-md mx-auto" style="max-width: 600px;">
      &copy; 2026 myvendor &nbsp;·&nbsp; 
      <a href="#">Help Center</a> &nbsp;·&nbsp; 
      <a href="/terms.html">Terms</a>
    </div>
  </footer>

  <div class="toast-msg" id="toastMsg">Notification</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    document.getElementById('searchInput').addEventListener('keyup', function(e) {
      const term = e.target.value.toLowerCase();
      const cards = document.querySelectorAll('.product-card');
      let visibleCount = 0;
      
      cards.forEach(card => {
        const title = card.querySelector('.fw-bold.small.text-truncate').innerText.toLowerCase();
        if(title.includes(term)) {
          card.style.display = 'block';
          visibleCount++;
        } else {
          card.style.display = 'none';
        }
      });

      const emptyState = document.getElementById('emptyState');
      if(visibleCount === 0 && cards.length > 0) {
        emptyState.classList.remove('hidden');
        document.getElementById('emptyTitle').innerText = "No products found";
        document.getElementById('emptyDesc').innerText = "Try a different search term.";
        document.getElementById('emptyAddBtn').classList.add('hidden');
      } else if (cards.length > 0) {
        emptyState.classList.add('hidden');
      }
    });
  </script>

  <script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
