<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Home - myvendor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body class="bg-light">

    <nav class="dash-nav bg-white border-bottom py-3 sticky-top">
        <div class="container d-flex justify-content-between align-items-center" style="max-width: 600px;">
            <a href="/dashboard/home.html" class="mv-logo fw-bold text-success text-decoration-none fs-4">my<span>vendor</span></a>
            <div class="nav-actions">
                <a href="/dashboard/home.html" class="active text-success mx-2 fs-5"><i class="bi bi-house-door-fill"></i></a>
                <a href="/dashboard/orders.html" class="text-muted mx-2 fs-5"><i class="bi bi-box-seam"></i></a>
                <a href="/dashboard/products.html" class="text-muted mx-2 fs-5"><i class="bi bi-grid"></i></a>
            </div>
        </div>
    </nav>

    <main class="container py-4" style="max-width: 600px;">
        <h2 id="welcomeName" class="fw-bold mb-1">Welcome! 👋</h2>
        <p class="text-muted mb-4" style="font-size: 0.9rem;">Your store link: <span id="storeLink" class="fw-bold text-success">loading...</span></p>

        <div class="row g-3 mb-4">
            <div class="col-6">
                <div class="bg-white p-3 rounded-4 border text-center">
                    <h3 id="statProducts" class="fw-bold m-0">0</h3>
                    <p class="text-muted small m-0">Live Products</p>
                </div>
            </div>
            <div class="col-6">
                <div class="bg-white p-3 rounded-4 border text-center">
                    <h3 id="statOrders" class="fw-bold m-0">0</h3>
                    <p class="text-muted small m-0">Total Orders</p>
                </div>
            </div>
        </div>

        <div class="d-grid gap-2 mb-4">
            <a href="/dashboard/add-product.html" class="btn btn-success p-3 rounded-4 fw-bold">
                <i class="bi bi-plus-lg me-2"></i> Add New Product
            </a>
            <button id="waShareBtn" class="btn btn-outline-success p-3 rounded-4 fw-bold">
                <i class="bi bi-whatsapp me-2"></i> Share Store Link
            </button>
        </div>

        <h5 class="fw-bold mb-3">Recent Orders</h5>
        <div id="recentOrdersList" class="bg-white rounded-4 border p-3">
            </div>
    </main>

    <script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
