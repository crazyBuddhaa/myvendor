<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Receipt | myvendor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Space+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --green-primary: #0f6e3f;
      --green-bright: #22c55e;
      --green-dark: #0a4a2a;
      --green-soft: #e9f7ef;
      --cream-bg: #fefaf5;
      --card-white: #ffffff;
      --text-dark: #1a2e1f;
      --text-muted: #4a6741;
      --border-light: #e9eee5;
      --shadow-sm: 0 8px 20px rgba(0, 32, 0, 0.04);
      --shadow-md: 0 12px 28px rgba(0, 20, 0, 0.08);
      --shadow-lg: 0 20px 40px rgba(0, 32, 0, 0.12);
      --radius-lg: 28px;
      --radius-md: 18px;
      --radius-sm: 12px;
    }

    body {
      background: linear-gradient(145deg, #f6fcf5 0%, #f0f7ec 100%);
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 280px;
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    .receipt-container {
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Receipt Card – like a paper slip */
    .receipt-card {
      background: var(--card-white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-light);
      transition: transform 0.2s;
    }

    /* Jagged bottom edge (thermal receipt style) */
    .receipt-card {
      position: relative;
    }
    .receipt-card::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 100%;
      height: 20px;
      background: linear-gradient(135deg, transparent 25%, var(--card-white) 25%) -10px 0,
                  linear-gradient(225deg, transparent 25%, var(--card-white) 25%) -10px 0;
      background-size: 20px 20px;
      transform: rotate(180deg);
      pointer-events: none;
    }

    .receipt-header {
      background: linear-gradient(135deg, var(--green-dark), var(--green-primary));
      padding: 1.5rem;
      text-align: center;
      color: white;
    }

    .receipt-header .logo {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 1.8rem;
      letter-spacing: -0.5px;
    }
    .receipt-header .logo span {
      color: #d9f99d;
    }
    .receipt-header .sub {
      font-size: 0.75rem;
      opacity: 0.9;
      margin-top: 0.25rem;
    }

    .receipt-body {
      padding: 1.8rem;
    }

    /* Order metadata */
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      background: var(--green-soft);
      padding: 1rem;
      border-radius: var(--radius-sm);
    }
    .meta-item {
      font-size: 0.8rem;
    }
    .meta-label {
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.5px;
    }
    .meta-value {
      font-weight: 700;
      color: var(--text-dark);
      word-break: break-word;
    }

    /* Items section – monospace for authentic feel */
    .items-section {
      margin: 1.5rem 0;
    }
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      border-bottom: 1px dashed var(--border-light);
      padding-bottom: 0.3rem;
    }
    .items-content {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      white-space: pre-wrap;
      background: #faf9f5;
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      color: var(--text-dark);
    }

    /* Total row */
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin: 1rem 0;
      padding: 0.75rem 0;
      border-top: 2px dashed var(--border-light);
      font-weight: 800;
      font-size: 1.2rem;
      color: var(--green-primary);
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--green-soft);
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 700;
      margin: 0.5rem 0;
    }
    .status-paid { background: #dcfce7; color: var(--green-dark); }
    .status-pending { background: #fef3c7; color: #b45309; }
    .status-cancelled { background: #fee2e2; color: #dc2626; }

    /* Footer */
    .receipt-footer {
      text-align: center;
      margin-top: 1.8rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-light);
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* Action buttons */
    .action-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .btn-action {
      flex: 1;
      padding: 0.8rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }
    .btn-share {
      background: var(--card-white);
      color: var(--green-dark);
      border: 1.5px solid var(--border-light);
    }
    .btn-share:hover {
      background: var(--green-soft);
      border-color: var(--green-primary);
    }
    .btn-print {
      background: var(--green-primary);
      color: white;
      box-shadow: var(--shadow-sm);
    }
    .btn-print:hover {
      background: var(--green-dark);
      transform: translateY(-2px);
    }

    /* Loading overlay */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(240, 247, 236, 0.95);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .loader {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border-light);
      border-top-color: var(--green-bright);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }

    @media print {
      body {
        background: white;
        padding: 0;
        margin: 0;
      }
      .receipt-container {
        max-width: 100%;
        box-shadow: none;
      }
      .receipt-card {
        box-shadow: none;
        border: 1px solid #ddd;
        border-radius: 0;
      }
      .receipt-card::after {
        display: none;
      }
      .action-buttons {
        display: none;
      }
      .loading-overlay {
        display: none;
      }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingState">
  <div class="loader"></div>
  <p style="font-weight: 600; color: var(--green-dark);">Loading receipt...</p>
</div>

<div class="receipt-container hidden" id="receiptContent">
  <div class="receipt-card">
    <div class="receipt-header">
      <div class="logo">my<span>vendor</span></div>
      <div class="sub">Official Receipt</div>
    </div>

    <div class="receipt-body">
      <!-- Store info -->
      <div class="text-center mb-3">
        <div class="fw-bold fs-5" id="storeName">Store Name</div>
        <div class="small text-muted" id="storeLink">myvendor.ng/store</div>
      </div>

      <!-- Order meta grid -->
      <div class="meta-grid">
        <div class="meta-item">
          <div class="meta-label">Receipt No.</div>
          <div class="meta-value" id="orderId">—</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Date & Time</div>
          <div class="meta-value" id="orderDate">—</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Customer</div>
          <div class="meta-value" id="customerName">—</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Status</div>
          <div class="meta-value"><span id="statusBadge" class="status-badge">—</span></div>
        </div>
      </div>

      <!-- Items -->
      <div class="items-section">
        <div class="section-title"><i class="bi bi-receipt me-1"></i> Order Items</div>
        <div class="items-content" id="orderItems">Loading...</div>
      </div>

      <!-- Total -->
      <div class="total-row">
        <span>TOTAL AMOUNT</span>
        <span id="orderTotal">₦0.00</span>
      </div>

      <!-- Footer note -->
      <div class="receipt-footer">
        <p class="mb-1">Thank you for shopping with us!</p>
        <p>For support, contact the vendor on WhatsApp.</p>
      </div>
    </div>
  </div>

  <div class="action-buttons">
    <button class="btn-action btn-share" onclick="copyReceiptLink()">
      <i class="bi bi-link-45deg"></i> Copy Link
    </button>
    <button class="btn-action btn-print" onclick="window.print()">
      <i class="bi bi-printer"></i> Print / PDF
    </button>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const SUPABASE_URL = 'https://sotdghhayztnpwnrzjzu.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_OcOKwSDnoCGm_rt725Bi-g_rV6tjGlK';
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function loadReceipt() {
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('id');

    if (!orderId) {
      alert("Invalid receipt link. No order ID found.");
      window.location.href = '/';
      return;
    }

    try {
      // Fetch order
      const { data: order, error: orderError } = await supabase
        .from('orders')
        .select('*')
        .eq('id', orderId)
        .single();

      if (orderError || !order) throw new Error("Order not found");

      // Fetch vendor details
      const { data: vendor, error: vendorError } = await supabase
        .from('vendor_profiles')
        .select('business_name, slug')
        .eq('id', order.vendor_id)
        .single();

      if (vendorError) console.warn("Vendor fetch error", vendorError);

      // Populate UI
      document.getElementById('storeName').textContent = vendor?.business_name || 'myvendor Store';
      // Automatically grabs 'myvendor.qzz.io' now, and your custom domain later!
const currentDomain = window.location.host; 
const storeLink = vendor?.slug ? `${currentDomain}/${vendor.slug}` : `${currentDomain}/store`;
      document.getElementById('storeLink').textContent = storeLink;
      document.getElementById('storeLink').href = `/${vendor?.slug || ''}`;

      document.getElementById('orderId').textContent = order.id;
      const formattedDate = new Date(order.created_at).toLocaleString('en-NG', {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
      document.getElementById('orderDate').textContent = formattedDate;
      document.getElementById('customerName').textContent = order.customer_name || '—';

      // Items (preserve line breaks)
      document.getElementById('orderItems').textContent = order.items || 'No items listed';

      // Total amount
      const total = parseFloat(order.total_amount) || 0;
      document.getElementById('orderTotal').textContent = `₦${total.toLocaleString()}`;

      // Status badge styling
      const statusSpan = document.getElementById('statusBadge');
      const status = order.status || 'new';
      let statusText = '';
      let statusClass = '';
      switch (status) {
        case 'new': statusText = 'New Order'; statusClass = 'status-pending'; break;
        case 'processing': statusText = 'Processing'; statusClass = 'status-pending'; break;
        case 'shipped': statusText = 'Shipped'; statusClass = 'status-paid'; break;
        case 'delivered': statusText = 'Delivered ✓'; statusClass = 'status-paid'; break;
        case 'cancelled': statusText = 'Cancelled ✗'; statusClass = 'status-cancelled'; break;
        default: statusText = 'Confirmed'; statusClass = 'status-paid';
      }
      statusSpan.textContent = statusText;
      statusSpan.className = `status-badge ${statusClass}`;

      // Hide loading, show receipt
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('receiptContent').classList.remove('hidden');

    } catch (err) {
      console.error(err);
      alert('Unable to load receipt. Please check the link or contact support.');
      window.location.href = '/';
    }
  }

  window.copyReceiptLink = function() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const btn = document.querySelector('.btn-share');
      const originalHtml = btn.innerHTML;
      btn.innerHTML = '<i class="bi bi-check-lg"></i> Copied!';
      setTimeout(() => btn.innerHTML = originalHtml, 2000);
    });
  };

  loadReceipt();
</script>
</body>
</html>
