<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>myvendor — Vendor Login & Signup</title>
  <meta name="description" content="Login or create your myvendor store — sell smarter on WhatsApp." />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Raleway:wght@600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green-primary: #0f6e3f; --green-bright: #22c55e; --green-dark: #0a4a2a; --green-soft: #e9f7ef;
      --gray-bg: #fafcf9; --card-white: #ffffff; --text-dark: #1a2e1f; --text-muted: #4a6741;
      --border-light: #e9eee5;
      --shadow-sm: 0 8px 20px rgba(0, 32, 0, 0.04), 0 2px 4px rgba(0, 0, 0, 0.02);
      --shadow-md: 0 12px 28px rgba(0, 20, 0, 0.08);
      --radius-lg: 20px; --radius-md: 16px; --radius-sm: 12px;
      --error: #dc2626; --error-bg: #fee2e2; --success-bg: #dcfce7;
    }

    body {
      background: linear-gradient(145deg, #f6fcf5 0%, #f0f7ec 100%);
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* subtle grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 280px;
      opacity: 0.025;
      pointer-events: none;
      z-index: 0;
    }

    /* Navbar – glass */
    .auth-nav { background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(34, 197, 94, 0.2); padding: 0.75rem 0; position: sticky; top: 0; z-index: 1000; }
    .nav-container { max-width: 640px; margin: 0 auto; padding: 0 1rem; display: flex; justify-content: space-between; align-items: center; }
    
    .mv-logo-modern { font-family: 'Raleway', sans-serif; font-weight: 800; font-size: 1.5rem; background: linear-gradient(135deg, var(--green-dark), var(--green-primary)); -webkit-background-clip: text; color: transparent; text-decoration: none; }
    .mv-logo-modern span { background: linear-gradient(135deg, var(--green-bright), #2b9348); -webkit-background-clip: text; color: transparent; }

    .btn-back-home { background: rgba(100, 116, 100, 0.08); border-radius: 40px; padding: 0.5rem 1rem; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-decoration: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.4rem; }
    .btn-back-home:hover { background: rgba(34, 197, 94, 0.15); color: var(--green-primary); }

    /* main container */
    .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; position: relative; z-index: 1; }
    .auth-card { max-width: 480px; width: 100%; background: var(--card-white); border-radius: var(--radius-lg); padding: 2rem 1.8rem; box-shadow: var(--shadow-md); border: 1px solid var(--border-light); animation: fadeUp 0.5s ease-out; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .auth-header { margin-bottom: 1.5rem; text-align: center; }
    .auth-header h1 { font-size: 1.6rem; font-weight: 800; background: linear-gradient(125deg, #14532d, #2b6e3c); -webkit-background-clip: text; color: transparent; margin-bottom: 0.25rem; }
    .auth-header p { font-size: 0.85rem; color: var(--text-muted); }

    /* tabs */
    .auth-tabs { display: flex; gap: 0.5rem; background: var(--gray-bg); border-radius: 60px; padding: 0.25rem; margin-bottom: 1.5rem; }
    .auth-tab { flex: 1; text-align: center; padding: 0.6rem; border-radius: 40px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; background: transparent; border: none; color: var(--text-muted); }
    .auth-tab.active { background: var(--card-white); color: var(--green-primary); box-shadow: var(--shadow-sm); }
    .auth-panel { display: none; }
    .auth-panel.active { display: block; }

    /* form elements */
    .form-group { margin-bottom: 1.2rem; }
    .form-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.4rem; }
    .input-icon-wrapper { position: relative; }
    .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem; pointer-events: none; }
    
    .form-control-modern { width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem; border: 1.5px solid var(--border-light); border-radius: var(--radius-sm); font-size: 0.9rem; background: var(--gray-bg); transition: all 0.2s; }
    .form-control-modern:focus { border-color: var(--green-bright); background: white; outline: none; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1); }
    
    .toggle-password { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 0; }
    .forgot-link { font-size: 0.7rem; color: var(--green-primary); text-decoration: none; font-weight: 600; transition: all 0.2s; }
    
    .slug-preview { background: var(--gray-bg); border-radius: var(--radius-sm); padding: 0.5rem 0.8rem; font-size: 0.7rem; color: var(--text-muted); margin-top: 0.4rem; display: flex; align-items: center; gap: 0.4rem; }
    .slug-preview span { font-weight: 700; color: var(--green-dark); }
    
    .terms-check { display: flex; gap: 0.6rem; align-items: flex-start; margin: 1rem 0; }
    .terms-check input { width: 16px; height: 16px; margin-top: 2px; accent-color: var(--green-primary); }
    .terms-check label { font-size: 0.75rem; color: var(--text-muted); line-height: 1.4; cursor: pointer; }
    .terms-check a { color: var(--green-primary); text-decoration: none; font-weight: 600; }

    /* buttons */
    .btn-submit { width: 100%; background: linear-gradient(105deg, var(--green-primary), var(--green-dark)); border: none; padding: 0.85rem; border-radius: var(--radius-sm); font-weight: 700; font-size: 0.9rem; color: white; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s; box-shadow: var(--shadow-sm); margin-top: 0.5rem; }
    .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.03); }
    .btn-submit:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }

    /* message alerts */
    .auth-message { padding: 0.75rem 1rem; border-radius: var(--radius-sm); font-size: 0.8rem; margin-bottom: 1rem; display: none; }
    .auth-message.error { background: var(--error-bg); border: 1px solid #fecaca; color: var(--error); }
    .auth-message.success { background: var(--success-bg); border: 1px solid #bbf7d0; color: var(--green-dark); }
    .auth-message.show { display: flex; align-items: center; gap: 0.5rem; }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255, 255, 255, 0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* footer */
    .auth-footer { text-align: center; padding: 1rem; font-size: 0.7rem; color: var(--text-muted); border-top: 1px solid rgba(34, 197, 94, 0.2); position: relative; z-index: 1;}
    .auth-footer a { color: var(--green-primary); text-decoration: none; font-weight: 600; }

    @media (max-width: 500px) {
      .auth-card { padding: 1.5rem; }
      .auth-header h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<nav class="auth-nav">
  <div class="nav-container">
    <a href="/" class="mv-logo-modern">my<span>vendor</span></a>
    <a href="/" class="btn-back-home"><i class="bi bi-arrow-left-short"></i> Back to Home</a>
  </div>
</nav>

<main class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome to myvendor</h1>
      <p>Your WhatsApp shop, beautifully organized</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="window.switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-signup" onclick="window.switchTab('signup')">Create Store</button>
    </div>

    <div class="auth-panel active" id="panel-login">
      <div id="loginMsg" class="auth-message"></div>

      <div class="form-group">
        <label class="form-label"><i class="bi bi-envelope"></i> Email Address</label>
        <div class="input-icon-wrapper">
          <i class="bi bi-envelope input-icon"></i>
          <input type="email" id="loginEmail" class="form-control-modern" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label class="form-label mb-0"><i class="bi bi-lock"></i> Password</label>
          <a href="#" class="forgot-link" onclick="window.handleForgotPassword(event)">Forgot?</a>
        </div>
        <div class="input-icon-wrapper">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" id="loginPassword" class="form-control-modern" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="toggle-password" onclick="window.togglePassword('loginPassword', this)"><i class="bi bi-eye"></i></button>
        </div>
      </div>

      <button id="loginBtn" class="btn-submit" onclick="window.handleLogin()">
        <span id="loginSpinner" class="spinner" style="display: none;"></span>
        <i id="loginIcon" class="bi bi-box-arrow-in-right"></i>
        <span id="loginLabel">Login to Dashboard</span>
      </button>

      <p class="text-center mt-3 mb-0" style="font-size:0.75rem; color:var(--text-muted);">
        No store? <a href="#" onclick="window.switchTab('signup')" style="color:var(--green-primary); font-weight:600; text-decoration:none;">Create one free →</a>
      </p>
    </div>

    <div class="auth-panel" id="panel-signup">
      <div id="signupMsg" class="auth-message"></div>

      <div class="form-group">
        <label class="form-label"><i class="bi bi-person"></i> Full Name</label>
        <div class="input-icon-wrapper">
          <i class="bi bi-person input-icon"></i>
          <input type="text" id="signupName" class="form-control-modern" placeholder="Your full name" autocomplete="name">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="bi bi-shop"></i> Store Name</label>
        <div class="input-icon-wrapper">
          <i class="bi bi-shop input-icon"></i>
          <input type="text" id="signupBusiness" class="form-control-modern" placeholder="e.g. GlamStore NG" oninput="window.updateSlug(this.value)">
        </div>
        <div class="slug-preview">
          <i class="bi bi-link-45deg"></i> myvendor.qzz.io/<span id="slugValue">yourstore</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="bi bi-whatsapp"></i> WhatsApp Number</label>
        <div class="input-icon-wrapper">
          <i class="bi bi-whatsapp input-icon"></i>
          <input type="tel" id="signupWa" class="form-control-modern" placeholder="2348012345678" autocomplete="tel">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="bi bi-envelope"></i> Email Address</label>
        <div class="input-icon-wrapper">
          <i class="bi bi-envelope input-icon"></i>
          <input type="email" id="signupEmail" class="form-control-modern" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label"><i class="bi bi-lock"></i> Password</label>
        <div class="input-icon-wrapper">
          <i class="bi bi-lock input-icon"></i>
          <input type="password" id="signupPassword" class="form-control-modern" placeholder="Min. 8 characters" autocomplete="new-password">
          <button type="button" class="toggle-password" onclick="window.togglePassword('signupPassword', this)"><i class="bi bi-eye"></i></button>
        </div>
      </div>

      <div class="terms-check">
        <input type="checkbox" id="termsCheckbox">
        <label for="termsCheckbox">
          I agree to myvendor's <a href="/terms.html">Terms & Conditions</a> and <a href="/privacy.html">Privacy Policy</a>.
        </label>
      </div>

      <button id="signupBtn" class="btn-submit" onclick="window.handleSignup()">
        <span id="signupSpinner" class="spinner" style="display: none;"></span>
        <i id="signupIcon" class="bi bi-shop-window"></i>
        <span id="signupLabel">Create My Free Store</span>
      </button>

      <p class="text-center mt-3 mb-0" style="font-size:0.75rem; color:var(--text-muted);">
        Already have a store? <a href="#" onclick="window.switchTab('login')" style="color:var(--green-primary); font-weight:600; text-decoration:none;">Login →</a>
      </p>
    </div>
  </div>
</main>

<footer class="auth-footer">
  <a href="/">← myvendor.qzz.io</a> &nbsp;·&nbsp; © 2026 theosnnetwork
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const SUPABASE_URL = 'https://sotdghhayztnpwnrzjzu.supabase.co'
  const SUPABASE_ANON_KEY = 'sb_publishable_OcOKwSDnoCGm_rt725Bi-g_rV6tjGlK'
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  window._supabase = supabase

  // Check if already logged in
  const { data: { session } } = await supabase.auth.getSession()
  if (session) window.location.href = '/dashboard/home.html'

  // Helper Functions
  window.setLoading = function(form, isLoading) {
    const btn = document.getElementById(`${form}Btn`)
    const spinner = document.getElementById(`${form}Spinner`)
    const icon = document.getElementById(`${form}Icon`)
    const label = document.getElementById(`${form}Label`)
    btn.disabled = isLoading
    if (spinner) spinner.style.display = isLoading ? 'inline-block' : 'none'
    if (icon) icon.style.display = isLoading ? 'none' : 'inline'
    if (label) label.textContent = isLoading ? (form === 'login' ? 'Logging in...' : 'Creating store...') : (form === 'login' ? 'Login to Dashboard' : 'Create My Free Store')
  }

  window.showMessage = function(containerId, text, type) {
    const msgDiv = document.getElementById(containerId)
    msgDiv.textContent = text
    msgDiv.className = `auth-message ${type} show`
    setTimeout(() => msgDiv.classList.remove('show'), 5000)
  }

  window.switchTab = function(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'))
    document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'))
    document.getElementById(`tab-${tab}`).classList.add('active')
    document.getElementById(`panel-${tab}`).classList.add('active')
  }

  window.updateSlug = function(value) {
    const slug = value.toLowerCase().replace(/[^a-z0-9-]/g, '').replace(/-+/g, '-').substring(0, 30)
    document.getElementById('slugValue').textContent = slug || 'yourstore'
  }

  window.togglePassword = function(inputId, btn) {
    const input = document.getElementById(inputId)
    const icon = btn.querySelector('i')
    if (input.type === 'password') {
      input.type = 'text'
      icon.className = 'bi bi-eye-slash'
    } else {
      input.type = 'password'
      icon.className = 'bi bi-eye'
    }
  }

  // Auth Functions
  window.handleLogin = async () => {
    const email = document.getElementById('loginEmail').value.trim()
    const password = document.getElementById('loginPassword').value
    if (!email || !password) {
      window.showMessage('loginMsg', 'Please fill in both email and password.', 'error')
      return
    }
    window.setLoading('login', true)
    const { error } = await supabase.auth.signInWithPassword({ email, password })
    window.setLoading('login', false)
    if (error) {
      window.showMessage('loginMsg', error.message, 'error')
    } else {
      window.location.href = '/dashboard/home.html'
    }
  }

  window.handleSignup = async () => {
    const name = document.getElementById('signupName').value.trim()
    const business = document.getElementById('signupBusiness').value.trim()
    const wa = document.getElementById('signupWa').value.trim()
    const email = document.getElementById('signupEmail').value.trim()
    const password = document.getElementById('signupPassword').value
    const terms = document.getElementById('termsCheckbox').checked
    const slug = document.getElementById('slugValue').textContent.trim()

    if (!name || !business || !wa || !email || !password || !terms) {
      window.showMessage('signupMsg', 'Please fill all fields and accept the terms.', 'error')
      return
    }

    // Check if slug already exists
    const { data: existing } = await supabase.from('vendor_profiles').select('slug').eq('slug', slug).maybeSingle()
    if (existing) {
      window.showMessage('signupMsg', 'That store name is already taken. Please choose another.', 'error')
      return
    }

    window.setLoading('signup', true)
    
    // Create the User in Auth
    const { data: authData, error: authError } = await supabase.auth.signUp({
      email,
      password
    })

    if (authError) {
      window.setLoading('signup', false)
      window.showMessage('signupMsg', authError.message, 'error')
      return
    }

    if (authData.user) {
      const { error: profileError } = await supabase.from('vendor_profiles').insert([{
        id: authData.user.id,
        full_name: name,
        slug: slug,
        business_name: business,
        wa_number: wa // Matches the wa_number column in Supabase
      }]);

      window.setLoading('signup', false)

      if (profileError) {
        // This will print the EXACT error from Supabase to your screen
        window.showMessage('signupMsg', 'DB Error: ' + profileError.message, 'error')
        console.error("Full Profile Error:", profileError);
      } else {
        window.showMessage('signupMsg', '🎉 Store created! Redirecting to your dashboard...', 'success')
        setTimeout(() => window.location.href = '/dashboard/home.html', 1500)
      }
    }
  }

  // Forgot Password with loading indicator and correct redirect URL
  window.handleForgotPassword = async (e) => {
    e.preventDefault()
    const email = document.getElementById('loginEmail').value.trim()
    
    if (!email) {
      window.showMessage('loginMsg', 'Enter your email address first.', 'error')
      return
    }
    
    // Grab the link element that was clicked
    const forgotLink = e.target;
    const originalText = forgotLink.innerText;
    
    // Set loading state
    forgotLink.innerText = 'Sending...';
    forgotLink.style.pointerEvents = 'none'; // Prevent double-clicking
    forgotLink.style.opacity = '0.6';
    
    // Pass the redirectTo option linking to your new reset-password page
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password.html'
    })
    
    // Revert loading state
    forgotLink.innerText = originalText;
    forgotLink.style.pointerEvents = 'auto';
    forgotLink.style.opacity = '1';
    
    if (error) {
      window.showMessage('loginMsg', error.message, 'error')
    } else {
      window.showMessage('loginMsg', 'Password reset link sent! Check your inbox.', 'success')
    }
  }
</script>
</body>
</html>
