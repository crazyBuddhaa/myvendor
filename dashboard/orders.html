<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - myvendor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body class="bg-light">

  <nav class="dash-nav bg-white border-bottom py-3 sticky-top">
    <div class="container d-flex justify-content-between align-items-center" style="max-width: 600px;">
      <a href="/dashboard/home.html" class="mv-logo fw-bold text-success text-decoration-none fs-4">my<span>vendor</span></a>
      <div class="nav-actions">
        <a href="/dashboard/home.html" class="text-muted mx-2 fs-5"><i class="bi bi-house-door"></i></a>
        <a href="/dashboard/orders.html" class="active text-success mx-2 fs-5"><i class="bi bi-box-seam-fill"></i></a>
        <a href="/dashboard/products.html" class="text-muted mx-2 fs-5"><i class="bi bi-grid"></i></a>
      </div>
    </div>
  </nav>

  <main class="container py-4" style="max-width: 600px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold m-0">Orders</h2>
      <button class="btn btn-success rounded-pill px-3 fw-bold" onclick="openCreateOrderModal()"><i class="bi bi-plus-lg"></i> Create</button>
    </div>

    <div class="filter-scroll mb-4">
      <div class="filter-pill active" onclick="filterOrders('all', this)">All</div>
      <div class="filter-pill" onclick="filterOrders('new', this)">New</div>
      <div class="filter-pill" onclick="filterOrders('shipped', this)">Shipped</div>
      <div class="filter-pill" onclick="filterOrders('delivered', this)">Delivered</div>
    </div>

    <div class="order-list" id="orderList">
       </div>

    <div id="emptyState" class="text-center py-5 hidden">
      <i class="bi bi-inbox text-muted fs-1"></i>
      <h5 class="mt-3 fw-bold">No orders found</h5>
    </div>
  </main>

  <div class="modal fade" id="createOrderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 border-0">
        <div class="modal-header border-0"><h5 class="modal-title fw-bold">New Order</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <form id="createOrderForm" onsubmit="handleCreateOrder(event)">
            <input type="text" id="newCustomerName" class="form-control mb-3 rounded-3" placeholder="Customer Name" required>
            <textarea id="newOrderItems" class="form-control mb-3 rounded-3" placeholder="Items (e.g. 1x Red Blouse)" rows="2" required></textarea>
            <input type="number" id="newOrderTotal" class="form-control mb-3 rounded-3" placeholder="Total Paid (₦)" required>
            <button type="submit" class="btn btn-success w-100 rounded-3 py-2 fw-bold">Generate Link</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 border-0">
        <div class="modal-header border-0"><h5 class="modal-title fw-bold">Update Status</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
            <select id="statusSelect" class="form-select mb-3 rounded-3">
                <option value="new">New</option>
                <option value="processing">Processing</option>
                <option value="shipped">Shipped</option>
                <option value="delivered">Delivered</option>
            </select>
            <div id="riderDetailsGroup" style="display:none;">
                <input type="text" id="riderName" class="form-control mb-2 rounded-3" placeholder="Rider Name">
                <input type="tel" id="riderPhone" class="form-control mb-3 rounded-3" placeholder="Rider Phone">
            </div>
            <button onclick="saveStatus()" class="btn btn-success w-100 rounded-3 py-2 fw-bold">Update</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-msg" id="toastMsg">Notification</div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
