<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Orders | myvendor — Manage Orders</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&family=Raleway:wght@600..900&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --green-primary: #0f6e3f; --green-bright: #22c55e; --green-dark: #0a4a2a; --green-soft: #e9f7ef;
      --gray-bg: #fafcf9; --card-white: #ffffff; --text-dark: #1a2e1f; --text-muted: #4a6741;
      --border-light: #e9eee5; --shadow-sm: 0 8px 20px rgba(0, 32, 0, 0.04);
    }
    
    body { background: var(--gray-bg); font-family: 'Inter', sans-serif; color: var(--text-dark); padding-bottom: 5rem; }

    /* Header */
    .dashboard-header { background: var(--card-white); padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border-light); position: sticky; top: 0; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
    .page-title { font-family: 'Raleway', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--green-dark); margin: 0; }

    /* Filters */
    .filter-scroll { display: flex; overflow-x: auto; gap: 0.5rem; padding: 1rem 1.5rem; scrollbar-width: none; border-bottom: 1px solid var(--border-light); background: var(--card-white); }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .filter-pill { background: var(--gray-bg); border: 1px solid var(--border-light); color: var(--text-muted); padding: 0.5rem 1.2rem; border-radius: 40px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; cursor: pointer; transition: 0.2s; }
    .filter-pill.active { background: var(--green-dark); color: white; border-color: var(--green-dark); }

    /* Order Cards */
    .orders-container { padding: 1.5rem; }
    .order-card { background: var(--card-white); border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); }
    .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px dashed var(--border-light); }
    .order-id { font-weight: 700; color: var(--green-dark); font-size: 0.9rem; }
    .order-date { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }
    .order-amount { font-weight: 800; color: var(--green-primary); font-size: 1.1rem; }
    
    .status-badge { display: inline-block; padding: 0.3rem 0.8rem; border-radius: 40px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-top: 0.3rem; }
    .status-new { background: #fef3c7; color: #b45309; }
    .status-processing { background: #e0f2fe; color: #0369a1; }
    .status-shipped { background: #fce7f3; color: #be185d; }
    .status-delivered { background: #dcfce7; color: #15803d; }
    .status-cancelled { background: #fee2e2; color: #b91c1c; }

    .customer-info { margin-bottom: 1rem; }
    .customer-name { font-weight: 600; font-size: 0.9rem; color: var(--text-dark); margin-bottom: 0.3rem; }
    .item-summary { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; white-space: pre-wrap; font-family: monospace; background: #f8fafc; padding: 0.5rem; border-radius: 8px;}

    .rider-info { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.8rem; margin-bottom: 1rem; }
    .rider-title { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.2rem; text-transform: uppercase; }
    .rider-details { font-size: 0.85rem; font-weight: 600; color: var(--text-dark); }
    .rider-details a { color: var(--green-primary); text-decoration: none; }

    .order-actions { display: grid; gap: 0.5rem; }
    .btn-action { padding: 0.7rem; border-radius: 8px; font-weight: 600; font-size: 0.85rem; border: none; display: flex; align-items: center; justify-content: center; gap: 0.4rem; cursor: pointer; }
    .btn-update { background: var(--green-dark); color: white; }
    .btn-track { background: var(--gray-bg); border: 1px solid var(--border-light); color: var(--text-dark); }
    .btn-chat { background: #25D366; color: white; grid-column: span 2; }
    .btn-receipt { background: #fefaf5; border: 1px solid #d97706; color: #b45309; }

    .fab-add { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; background: var(--green-dark); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; box-shadow: 0 10px 25px rgba(10, 74, 42, 0.4); border: none; z-index: 100; transition: transform 0.2s; }
    .fab-add:active { transform: scale(0.9); }
    .empty-state { text-align: center; padding: 4rem 1.5rem; color: var(--text-muted); }
    .hidden { display: none !important; }

    /* Navigation Bottom */
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card-white); display: flex; justify-content: space-around; padding: 0.8rem 0; border-top: 1px solid var(--border-light); z-index: 50; }
    .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-muted); text-decoration: none; font-size: 0.75rem; font-weight: 500; gap: 0.2rem; }
    .nav-item.active { color: var(--green-dark); font-weight: 700; }
    .nav-item i { font-size: 1.2rem; }
  </style>
</head>
<body>

<header class="dashboard-header">
  <h1 class="page-title">Orders</h1>
  <button class="btn btn-sm btn-light border" onclick="window.loadOrders()">
    <i class="bi bi-arrow-clockwise"></i>
  </button>
</header>

<div class="filter-scroll">
  <div class="filter-pill active" onclick="filterOrders('all', this)">All Orders</div>
  <div class="filter-pill" onclick="filterOrders('new', this)">New</div>
  <div class="filter-pill" onclick="filterOrders('processing', this)">Processing</div>
  <div class="filter-pill" onclick="filterOrders('shipped', this)">Shipped</div>
  <div class="filter-pill" onclick="filterOrders('delivered', this)">Delivered</div>
</div>

<main class="orders-container">
  <div id="orderList">
    </div>

  <div id="emptyState" class="empty-state hidden">
    <i class="bi bi-inbox fs-1 mb-2 d-block" style="opacity: 0.5;"></i>
    <h5 style="font-weight: 700; color: var(--text-dark);">No orders found</h5>
    <p style="font-size: 0.85rem;">You don't have any orders in this category yet.</p>
  </div>
</main>

<button class="fab-add" data-bs-toggle="modal" data-bs-target="#createOrderModal">
  <i class="bi bi-plus-lg"></i>
</button>

<nav class="bottom-nav">
  <a href="home.html" class="nav-item"><i class="bi bi-house-door"></i> Home</a>
  <a href="products.html" class="nav-item"><i class="bi bi-grid"></i> Products</a>
  <a href="orders.html" class="nav-item active"><i class="bi bi-receipt"></i> Orders</a>
  <a href="analytics.html" class="nav-item"><i class="bi bi-bar-chart"></i> Insights</a>
  <a href="settings.html" class="nav-item"><i class="bi bi-gear"></i> Settings</a>
</nav>

<div class="modal fade" id="createOrderModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius: 16px; border: none;">
      <div class="modal-header">
        <h5 class="modal-title fw-bold" style="color: var(--green-dark);">Create Order</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="createOrderForm" onsubmit="window.handleCreateOrder(event)">
          
          <div class="mb-3">
            <label class="form-label text-muted" style="font-size: 0.8rem; font-weight: 600;">Customer Name</label>
            <input type="text" class="form-control" id="newCustomerName" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label text-muted" style="font-size: 0.8rem; font-weight: 600;">Order Items</label>
            
            <div id="orderItemsContainer">
              <div class="item-row d-flex gap-2 mb-2">
                <input type="number" class="form-control qty-input" placeholder="Qty" value="1" min="1" style="width: 80px;" required>
                <input type="text" class="form-control name-input" placeholder="Product name" style="flex: 1;" required>
                <input type="text" class="form-control variant-input" placeholder="Variant (Optional)" style="flex: 1;">
                <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()" style="border-radius: 8px;">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </div>

            <button type="button" class="btn btn-sm btn-light w-100 mt-1" style="border: 1px dashed #ccc; color: #666;" onclick="window.addOrderItemRow()">
              <i class="bi bi-plus-lg"></i> Add Another Item
            </button>
          </div>

          <div class="mb-4">
            <label class="form-label text-muted" style="font-size: 0.8rem; font-weight: 600;">Total Amount (₦)</label>
            <input type="number" class="form-control" id="newOrderTotal" placeholder="0.00" required>
          </div>

          <button type="submit" class="btn btn-success w-100 py-2" style="background: var(--green-dark); border: none; border-radius: 8px; font-weight: 600;">Save & Generate Link</button>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="statusModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius: 16px; border: none;">
      <div class="modal-header">
        <h5 class="modal-title fw-bold" style="color: var(--green-dark);">Update Status</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label class="form-label text-muted" style="font-size: 0.8rem; font-weight: 600;">Set new status</label>
        <select class="form-select mb-3" id="statusSelect">
          <option value="new">New Order</option>
          <option value="processing">Processing (Packaging)</option>
          <option value="shipped">Shipped / Out for Delivery</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>

        <div class="mb-3" id="riderDetailsGroup" style="display: none; background: #f8fafc; padding: 1rem; border-radius: 8px; border: 1px dashed #cbd5e1;">
          <label class="form-label text-muted" style="font-size: 0.8rem; font-weight: 600;"><i class="bi bi-bicycle"></i> Rider Details (Optional)</label>
          <input type="text" class="form-control mb-2" id="riderName" placeholder="Rider / Courier Name">
          <input type="tel" class="form-control" id="riderPhone" placeholder="Rider Phone Number">
        </div>

        <button type="button" class="btn btn-success w-100 py-2" style="background: var(--green-dark); border: none; border-radius: 8px; font-weight: 600;" onclick="window.saveStatus()">Save Update</button>
      </div>
    </div>
  </div>
</div>

<div class="position-fixed bottom-0 start-50 translate-middle-x p-3" style="z-index: 11; margin-bottom: 60px;">
  <div id="toastMsg" class="toast align-items-center text-white bg-dark border-0" style="border-radius: 8px;" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="toastText">Action successful</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
