<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Product - myvendor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --green: #16a34a; --green-dark: #14532d; --bg-color: #f8faf8;
      --card-bg: #ffffff; --text-main: #0f1a0f; --text-muted: #4b6b50;
      --border-color:#e5e7eb;
    }
    body { font-family: 'Open Sans', sans-serif; background-color: var(--bg-color); color: var(--text-main); }
    h1, h2, h3, h5 { font-family: 'Raleway', sans-serif; }
    
    .dash-nav { background: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 1rem 0; position: sticky; top: 0; z-index: 1000; }
    .mv-logo { font-family: 'Raleway', sans-serif; font-weight: 800; font-size: 1.2rem; color: var(--green-dark); text-decoration: none; }
    .mv-logo span { color: var(--green); }
    
    .btn-back { color: var(--text-muted); font-size: 0.9rem; font-weight: 700; text-decoration: none; display: flex; align-items: center; gap: 0.3rem; }
    .btn-back:hover { color: var(--green); }

    .form-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; }
    .form-label { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.3rem; }
    .form-control-mv { width: 100%; padding: 0.8rem 1rem; border: 1.5px solid var(--border-color); border-radius: 10px; font-size: 0.95rem; outline: none; margin-bottom: 1rem; background: var(--bg-color); }
    .form-control-mv:focus { border-color: var(--green); background: white; }

    .img-upload-box { border: 2px dashed var(--border-color); border-radius: 12px; padding: 2rem 1rem; text-align: center; cursor: pointer; position: relative; background: var(--bg-color); margin-bottom: 1rem; transition: 0.2s; }
    .img-upload-box:hover { border-color: var(--green); background: #f0fdf4; }
    .img-preview { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; display: none; margin-top: 1rem; }
    
    .btn-save { width: 100%; padding: 0.85rem; background: var(--green); color: white; border: none; border-radius: 10px; font-weight: 700; font-size: 1rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <nav class="dash-nav">
    <div class="container max-w-md mx-auto d-flex justify-content-between align-items-center" style="max-width: 600px;">
      <a href="/dashboard/products.html" class="btn-back"><i class="bi bi-arrow-left"></i> Back</a>
      <a href="/dashboard/home.html" class="mv-logo">my<span>vendor</span></a>
    </div>
  </nav>

  <main class="container max-w-md mx-auto mt-4" style="max-width: 600px;">
    <h1 style="font-size: 1.4rem; font-weight: 800; color: var(--green-dark); margin-bottom: 1rem;">Edit Product</h1>

    <div class="form-card" id="loadingState">
        <div class="text-center py-5 text-muted">
            <div class="spinner-border text-success mb-3" role="status"></div>
            <p>Loading product details...</p>
        </div>
    </div>

    <form id="editProductForm" class="form-card hidden" onsubmit="updateProduct(event)">
      <label class="form-label">Product Image</label>
      <div class="img-upload-box" onclick="document.getElementById('editFileInput').click()">
        <i class="bi bi-image text-muted fs-2"></i>
        <div class="text-muted mt-2 fw-bold" style="font-size: 0.85rem;">Tap to change image</div>
        <input type="file" id="editFileInput" class="hidden" accept="image/*" onchange="previewEditImage(this)">
        <img id="editImagePreview" class="img-preview" src="">
        <button type="button" id="editRemoveImgBtn" class="btn btn-sm btn-danger mt-2 hidden" style="position: absolute; top: 10px; right: 10px;" onclick="clearEditImage(event)"><i class="bi bi-trash"></i></button>
      </div>

      <label class="form-label">Product Title</label>
      <input type="text" id="editProdTitle" class="form-control-mv" required>

      <label class="form-label">Price (₦)</label>
      <input type="number" id="editProdPrice" class="form-control-mv" required>

      <label class="form-label">Category</label>
      <select id="editProdCategory" class="form-control-mv">
        <option value="Fashion">Fashion & Apparel</option>
        <option value="Shoes">Shoes</option>
        <option value="Bags & Accessories">Bags & Accessories</option>
        <option value="Beauty">Beauty & Cosmetics</option>
        <option value="Electronics">Electronics</option>
        <option value="Other">Other</option>
      </select>

      <label class="form-label">Description (Optional)</label>
      <textarea id="editProdDesc" class="form-control-mv" rows="3"></textarea>

      <div class="d-flex justify-content-between align-items-center mb-4 p-3 border rounded-3 bg-light">
        <div>
          <div class="fw-bold" style="font-size: 0.9rem;">In Stock</div>
          <div class="text-muted" style="font-size: 0.75rem;">Is this item available?</div>
        </div>
        <div class="form-check form-switch m-0 fs-4">
          <input class="form-check-input" type="checkbox" role="switch" id="editStockSwitch">
        </div>
      </div>

      <button type="submit" id="btnUpdate" class="btn-save">Update Product</button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
