<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Add Product | myvendor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&family=Raleway:wght@600..900&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --green-primary: #0f6e3f;
      --green-bright: #22c55e;
      --green-dark: #0a4a2a;
      --green-soft: #e9f7ef;
      --gray-bg: #fafcf9;
      --card-white: #ffffff;
      --text-dark: #1a2e1f;
      --text-muted: #4a6741;
      --border-light: #e9eee5;
      --shadow-sm: 0 8px 20px rgba(0, 32, 0, 0.04);
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    body {
      background: linear-gradient(145deg, #f6fcf5 0%, #f0f7ec 100%);
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      padding-bottom: 90px; /* Space for sticky save button */
    }

    h1, h2, h3, h4 {
      font-family: 'Raleway', sans-serif;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    /* Navbar */
    .top-nav {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(34, 197, 94, 0.2);
      padding: 0.9rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .btn-back-modern {
      background: rgba(100, 116, 100, 0.1); border-radius: 40px; padding: 0.5rem 1rem; font-size: 0.85rem; font-weight: 600;
      color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: all 0.2s;
    }
    .btn-back-modern:hover { background: rgba(34, 197, 94, 0.15); color: var(--green-primary); transform: translateX(-2px); }

    /* Container */
    .form-container { max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem; }
    
    .page-title { font-size: 1.6rem; color: var(--green-dark); margin-bottom: 1.2rem; }

    /* Form Cards */
    .form-section {
      background: var(--card-white);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-sm);
      margin-bottom: 1.5rem;
    }
    .section-title {
      font-size: 1.1rem;
      color: var(--green-primary);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Inputs */
    .form-label-modern { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.4rem; display: block; }
    .form-control-modern, .form-select-modern {
      width: 100%; padding: 0.8rem 1rem; border: 1.5px solid var(--border-light); border-radius: var(--radius-sm);
      font-size: 0.95rem; background: var(--gray-bg); transition: all 0.2s; font-family: 'Inter', sans-serif;
    }
    .form-control-modern:focus, .form-select-modern:focus { border-color: var(--green-bright); background: white; outline: none; box-shadow: 0 0 0 3px rgba(34,197,94,0.1); }
    textarea.form-control-modern { resize: vertical; min-height: 100px; }

    /* Image Upload Zone */
    .upload-zone {
      border: 2px dashed var(--border-light);
      border-radius: var(--radius-md);
      padding: 2rem 1rem;
      text-align: center;
      background: var(--gray-bg);
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .upload-zone:hover { border-color: var(--green-bright); background: var(--green-soft); }
    .upload-icon { font-size: 2.5rem; color: var(--green-primary); margin-bottom: 0.5rem; }
    .upload-text { font-size: 0.9rem; font-weight: 600; color: var(--text-dark); }
    .upload-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.2rem; }
    
    #imagePreview {
      width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; border-radius: calc(var(--radius-md) - 2px);
    }

    /* Action Bar */
    .action-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(12px); border-top: 1px solid var(--border-light);
      padding: 1rem; z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
    }
    .action-bar-inner { max-width: 600px; margin: 0 auto; display: flex; gap: 1rem; }
    
    .btn-save {
      flex: 1; background: linear-gradient(135deg, var(--green-primary), var(--green-dark)); border: none;
      padding: 0.9rem; border-radius: 60px; font-weight: 700; font-size: 1rem; color: white; transition: all 0.2s;
    }
    .btn-save:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(15, 110, 63, 0.3); }
    .btn-cancel {
      background: var(--gray-bg); border: 1px solid var(--border-light); padding: 0.9rem 1.5rem;
      border-radius: 60px; font-weight: 700; color: var(--text-muted); text-decoration: none;
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <div class="form-container d-flex align-items-center" style="padding-top: 0; padding-bottom: 0;">
    <a href="/dashboard/products.html" class="btn-back-modern"><i class="bi bi-arrow-left-short fs-5"></i> Cancel</a>
  </div>
</nav>

<main class="form-container">
  <h1 class="page-title" id="pageHeader">Add New Product</h1>

  <form id="productForm" onsubmit="window.saveProduct(event)">
    <input type="hidden" id="imageUrl" value="">

    <div class="form-section">
      <div class="section-title"><i class="bi bi-info-circle"></i> Basic Details</div>
      
      <div class="mb-3">
        <label class="form-label-modern">Product Title <span class="text-danger">*</span></label>
        <input type="text" id="productTitle" class="form-control-modern" placeholder="e.g., Luxury Silk Blouse" required>
      </div>

      <div class="mb-3">
        <label class="form-label-modern">Price (₦) <span class="text-danger">*</span></label>
        <input type="number" id="productPrice" class="form-control-modern" placeholder="0.00" required>
      </div>

      <div class="mb-2">
        <label class="form-label-modern">Description</label>
        <textarea id="productDesc" class="form-control-modern" placeholder="Describe the item, material, uses..."></textarea>
      </div>
    </div>

    <div class="form-section">
      <div class="section-title"><i class="bi bi-image"></i> Product Image</div>
      <div class="upload-zone" id="uploadWidget">
        <i class="bi bi-cloud-arrow-up upload-icon"></i>
        <div class="upload-text">Tap to upload image</div>
        <div class="upload-sub">Optimized automatically by Cloudinary</div>
        <img id="imagePreview" src="" alt="Preview" class="d-none">
      </div>
    </div>

    <div class="form-section">
      <div class="section-title"><i class="bi bi-tags"></i> Attributes & Categories</div>
      
      <div class="mb-3">
        <label class="form-label-modern">Category</label>
        <select id="productCategory" class="form-select-modern">
          <option value="Fashion & Apparel">Fashion & Apparel</option>
          <option value="Health & Beauty">Health & Beauty</option>
          <option value="Electronics & Tech">Electronics & Tech</option>
          <option value="Food & Groceries">Food & Groceries</option>
          <option value="Home & Lifestyle">Home & Lifestyle</option>
          <option value="Digital Products">Digital Products</option>
          <option value="Other" selected>Other</option>
        </select>
      </div>

      <div class="row g-2 mb-2">
        <div class="col-6">
          <label class="form-label-modern">Colors (Optional)</label>
          <input type="text" id="productColors" class="form-control-modern" placeholder="Red, Blue, Black">
        </div>
        <div class="col-6">
          <label class="form-label-modern">Sizes (Optional)</label>
          <input type="text" id="productSizes" class="form-control-modern" placeholder="S, M, L, XL">
        </div>
      </div>
      <div style="font-size: 0.7rem; color: var(--text-muted);">Separate multiple options with commas.</div>
    </div>

    <div class="form-section">
      <div class="section-title"><i class="bi bi-box-seam"></i> Inventory</div>
      
      <div class="row g-2 mb-3">
        <div class="col-6">
          <label class="form-label-modern">Status</label>
          <select id="productStatus" class="form-select-modern">
            <option value="active" selected>In Stock</option>
            <option value="pre_order">Pre-Order</option>
            <option value="out_of_stock">Out of Stock</option>
          </select>
        </div>
        <div class="col-6">
          <label class="form-label-modern">Quantity Available</label>
          <input type="number" id="productQty" class="form-control-modern" placeholder="Leave blank for unlimited">
        </div>
      </div>
    </div>

    <div class="action-bar">
      <div class="action-bar-inner">
        <button type="submit" class="btn-save" id="saveBtn">Save Product</button>
      </div>
    </div>
  </form>
</main>

<script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
<script>
  // Cloudinary Initialization
  // IMPORTANT: Replace 'YOUR_CLOUD_NAME' and 'YOUR_UPLOAD_PRESET' with your actual Cloudinary details
  var myWidget = cloudinary.createUploadWidget({
    cloudName: 'dws2n3pza', // Replace with your cloud name
    uploadPreset: 'ml_default', // Replace with your unsigned preset name
    maxFiles: 1,
    sources: ['local', 'camera', 'instagram'],
    styles: { palette: { window: "#fefaf5", sourceBg: "#ffffff", windowBorder: "#e9eee5", tabIcon: "#1f6e43", inactiveTabIcon: "#4a6741", menuIcons: "#1f6e43", link: "#1f6e43", action: "#22c55e", inProgress: "#22c55e", complete: "#1f6e43", error: "#ef4444", textDark: "#1a2e1f", textLight: "#fefaf5" } }
  }, (error, result) => { 
    if (!error && result && result.event === "success") { 
      const secureUrl = result.info.secure_url;
      document.getElementById('imageUrl').value = secureUrl;
      const preview = document.getElementById('imagePreview');
      preview.src = secureUrl;
      preview.classList.remove('d-none');
    }
  });

  document.getElementById("uploadWidget").addEventListener("click", function() {
      myWidget.open();
  }, false);
</script>

<script type="module" src="/assets/js/dashboard.js"></script>

</body>
</html>
