<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analytics - myvendor</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800;900&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root { --green: #16a34a; --green-dark: #14532d; --bg-color: #f8faf8; --card-bg: #ffffff; --text-muted: #4b6b50; --border-color:#e5e7eb; }
    body { font-family: 'Open Sans', sans-serif; background-color: var(--bg-color); color: #0f1a0f; }
    h1, h5 { font-family: 'Raleway', sans-serif; }
    
    .dash-nav { background: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 1rem 0; position: sticky; top: 0; z-index: 1000; }
    .btn-back { color: var(--text-muted); font-size: 0.9rem; font-weight: 700; text-decoration: none; }
    
    .stat-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.2rem; text-align: center; margin-bottom: 1rem; }
    .stat-title { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.3rem; }
    .stat-number { font-size: 1.8rem; font-weight: 900; color: var(--green-dark); line-height: 1; }
    
    .dash-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.25rem; margin-bottom: 1.25rem; }
    .section-title { font-size: 1rem; font-weight: 800; margin-bottom: 1rem; color: var(--green-dark); border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
  </style>
</head>
<body>
  <nav class="dash-nav">
    <div class="container d-flex justify-content-between align-items-center" style="max-width: 600px;">
      <a href="/dashboard/home.html" class="btn-back"><i class="bi bi-arrow-left"></i> Back</a>
      <span class="fw-bold text-success">Analytics</span>
    </div>
  </nav>

  <main class="container mt-4" style="max-width: 600px;">
    <h1 class="fw-bold mb-4" style="font-size: 1.4rem; color: var(--green-dark);">Performance</h1>
    
    <div class="stat-card" style="border-top: 4px solid var(--green);">
      <div class="stat-title">Total Revenue (Delivered)</div>
      <div class="stat-number" id="totalRevenue">₦0</div>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-6">
        <div class="stat-card p-3">
          <div class="stat-title">Total Orders</div>
          <div class="stat-number" id="totalOrders">0</div>
        </div>
      </div>
      <div class="col-6">
        <div class="stat-card p-3">
          <div class="stat-title">Pending Orders</div>
          <div class="stat-number text-warning" id="pendingOrders">0</div>
        </div>
      </div>
    </div>

    <div class="dash-card">
        <div class="section-title"><i class="bi bi-graph-up me-2"></i>Traffic & Conversions</div>
        <div class="row g-2 mt-2">
            <div class="col-4 text-center">
                <div class="stat-number text-dark" id="statStoreViews" style="font-size: 1.4rem;">0</div>
                <div class="stat-title mt-1" style="font-size: 0.65rem;">Store Views</div>
            </div>
            <div class="col-4 text-center border-start border-end">
                <div class="stat-number text-primary" id="statProductViews" style="font-size: 1.4rem;">0</div>
                <div class="stat-title mt-1" style="font-size: 0.65rem;">Product Views</div>
            </div>
            <div class="col-4 text-center">
                <div class="stat-number text-success" id="statWaClicks" style="font-size: 1.4rem;">0</div>
                <div class="stat-title mt-1" style="font-size: 0.65rem;">WA Clicks</div>
            </div>
        </div>
    </div>

    <div class="dash-card">
        <div class="section-title"><i class="bi bi-star-fill text-warning me-2"></i>Top Products</div>
        <div id="topProductsList">
            <div class="text-center py-4 text-muted">
                <div class="spinner-border spinner-border-sm text-success mb-2" role="status"></div>
                <p class="small">Crunching numbers...</p>
            </div>
        </div>
    </div>

  </main>
  
  <script type="module" src="/assets/js/dashboard.js"></script>
</body>
</html>
