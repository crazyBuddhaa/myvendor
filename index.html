<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved UI Redesign</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #a8e0d6, #009688);
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin: 15px 0;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        h1, h2, h3 {
            margin: 10px 0;
            font-weight: bold;
        }

        h1 {
            font-size: 2.5em;
            color: #00574b;
        }

        h2 {
            font-size: 2em;
            color: #00796b;
        }

        h3 {
            font-size: 1.5em;
        }

        a {
            text-decoration: none;
            color: #00796b;
            transition: color 0.3s;
        }

        a:hover {
            color: #004d40;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            h1 {
                font-size: 1.8em;
            }

            h2 {
                font-size: 1.5em;
            }

            h3 {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to MyVendor</h1>
        <div class="card">
            <h2>Card Title</h2>
            <p>This is a description of the card content, showcasing improved UI and UX design elements.</p>
        </div>
        <div class="card">
            <h3>Secondary Card</h3>
            <p>Enhancing user interactions with modern design practices.</p>
        </div>
    </div>
</body>
</html>
