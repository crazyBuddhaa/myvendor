<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront - myvendor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --forest:    #0d3320;
            --green:     #1a6b3c;
            --mint:      #22c55e;
            --sage:      #86efac;
            --cream:     #faf7f0;
            --cream-dark:#f0ebe0;
            --warm-white:#fffcf5;
            --text-main: #0d1f12;
            --text-mid:  #3a5c43;
            --text-soft: #6b8f72;
            --border:    #dde8de;
            --card-bg:   #ffffff;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* ── GRAIN OVERLAY ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 180px;
        }

        /* ── HEADER ── */
        .store-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--forest);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 0.9rem 0;
            overflow: hidden;
        }

        /* mesh gradient blobs */
        .store-header::before,
        .store-header::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
            pointer-events: none;
        }
        .store-header::before {
            width: 260px; height: 160px;
            background: radial-gradient(circle, #22c55e, transparent);
            top: -60px; left: -40px;
        }
        .store-header::after {
            width: 200px; height: 140px;
            background: radial-gradient(circle, #4ade80, transparent);
            bottom: -70px; right: 10%;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 1;
        }

        .store-brand {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            text-decoration: none;
        }
        .store-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 1.05rem;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
        }
        .store-wordmark {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: -0.01em;
            line-height: 1;
        }
        .store-wordmark span {
            display: block;
            font-family: 'DM Sans', sans-serif;
            font-weight: 400;
            font-size: 0.62rem;
            color: var(--sage);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-top: 1px;
        }

        /* ── HERO STRIP ── */
        .hero-strip {
            background: linear-gradient(135deg, #0f2d1a 0%, #14532d 60%, #166534 100%);
            padding: 2rem 0 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .hero-strip::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 120% at 50% 120%, rgba(34,197,94,0.18), transparent);
        }
        .hero-eyebrow {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--sage);
            margin-bottom: 0.5rem;
            position: relative;
        }
        .hero-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: #fff;
            line-height: 1.1;
            position: relative;
        }
        .hero-title em {
            font-style: italic;
            color: var(--mint);
        }

        /* ── SEARCH ── */
        .search-zone {
            padding: 1.4rem 0 0.6rem;
        }
        .search-wrap {
            position: relative;
        }
        .search-wrap .s-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-soft);
            font-size: 0.95rem;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.7rem;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            background: var(--warm-white);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input::placeholder { color: var(--text-soft); }
        .search-input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3.5px rgba(26,107,60,0.12);
        }

        /* ── CATEGORY FILTERS ── */
        .filter-track {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: none;
        }
        .filter-track::-webkit-scrollbar { display: none; }
        
        .filter-pill {
            background: var(--warm-white);
            border: 1px solid var(--border);
            color: var(--text-soft);
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        .filter-pill.active {
            background: var(--forest);
            border-color: var(--forest);
            color: var(--cream);
        }

        /* ── SECTION LABEL ── */
        .section-label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1rem;
        }
        .section-label-text {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--forest);
        }
        .section-label-line {
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .section-label-count {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-soft);
            letter-spacing: 0.05em;
        }

        /* ── PRODUCT GRID ── */
        #productGrid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.85rem;
        }

        /* ── PRODUCT CARD ── */
        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            transition: transform 0.22s cubic-bezier(.25,.8,.25,1),
                        box-shadow 0.22s cubic-bezier(.25,.8,.25,1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            height: 100%;
        }
        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(13,51,32,0.12);
        }
        .product-card:active { transform: scale(0.97); }

        /* image area */
        .prod-img-wrapper {
            aspect-ratio: 1/1;
            background: var(--cream-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
        }
        .prod-img-wrapper img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .product-card:hover .prod-img-wrapper img {
            transform: scale(1.05);
        }

        /* green shimmer on hover */
        .prod-img-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, rgba(34,197,94,0.12), transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .product-card:hover .prod-img-wrapper::after { opacity: 1; }

        /* info */
        .prod-info {
            padding: 0.7rem 0.75rem 0.8rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            gap: 0.3rem;
        }
        .prod-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.2rem;
        }
        .prod-price {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--green);
            margin-top: auto;
            margin-bottom: 0;
        }

        /* sold-out */
        .sold-out-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(13,31,18,0.75);
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 2;
        }

        /* ── LOADING ── */
        #loadingState {
            grid-column: 1 / -1;
            padding: 4rem 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-soft);
        }
        .loader-ring {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── EMPTY STATE ── */
        #emptyState {
            text-align: center;
            padding: 4rem 1rem;
        }
        .empty-icon-wrap {
            width: 70px; height: 70px;
            border-radius: 20px;
            background: var(--cream-dark);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.2rem;
            font-size: 1.8rem;
            color: var(--text-soft);
        }
        #emptyState h5 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--forest);
            margin-bottom: 0.4rem;
        }
        #emptyState p { font-size: 0.85rem; color: var(--text-soft); margin-bottom: 0; }

        /* ── FOOTER ── */
        .site-footer {
            margin-top: 3rem;
            padding: 1.5rem 1rem;
            text-align: center;
            border-top: 1px solid var(--border);
        }
        .footer-brand {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            color: var(--text-soft);
        }
        .footer-brand strong {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--green);
        }
        .footer-dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--sage);
            display: inline-block;
        }

        /* ── UTILITIES ── */
        .hidden { display: none !important; }

        /* ── ENTRANCE ANIMATION ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .product-item {
            opacity: 0;
            animation: fadeUp 0.4s ease forwards;
        }
    </style>
</head>
<body>

    <nav class="store-header">
        <div class="container header-inner" style="max-width:620px;">
            <a href="#" id="navStoreLink" class="store-brand text-decoration-none">
                <div class="store-icon"><i class="bi bi-shop"></i></div>
                <div class="store-wordmark">
                    <span id="displayStoreName">Loading…</span>
                    <span>Official Store</span>
                </div>
            </a>
        </div>
    </nav>

    <div class="hero-strip">
        <div class="container" style="max-width:620px; position:relative; z-index:1;">
            <p class="hero-eyebrow">Welcome to the catalog</p>
            <h2 class="hero-title">Fresh finds,<br><em>every day.</em></h2>
        </div>
    </div>

    <main class="container py-3" style="max-width:620px;">

        <div class="search-zone">
            <div class="search-wrap">
                <i class="bi bi-search s-icon"></i>
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Search the catalog…"
                    onkeyup="searchStore()"
                    autocomplete="off"
                >
            </div>
        </div>

        <div id="categoryFilters" class="filter-track mt-2 mb-1" style="display: none;">
            </div>

        <div class="section-label mt-3">
            <span class="section-label-text">All Products</span>
            <span class="section-label-line"></span>
            <span class="section-label-count" id="productCount">0 Items</span>
        </div>

        <div id="productGrid">
            <div id="loadingState">
                <div class="loader-ring"></div>
                <span style="font-size:0.82rem; font-weight:500;">Loading catalog…</span>
            </div>
        </div>

        <div id="emptyState" class="empty-state hidden">
            <div class="empty-icon-wrap"><i class="bi bi-search"></i></div>
            <h5>No products found</h5>
            <p>Try a different search term.</p>
        </div>

    </main>

    <footer class="site-footer">
        <div class="footer-brand">
            Powered by <span class="footer-dot mx-1"></span> <strong>myvendor</strong>
        </div>
    </footer>

    <script type="module" src="/assets/js/storefront.js"></script>
</body>
</html>
