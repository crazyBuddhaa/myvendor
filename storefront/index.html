<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront - myvendor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --green: #16a34a; --green-dark: #14532d; }
        body { font-family: 'Open Sans', sans-serif; background: #f8faf8; }
        .product-card { background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; position: relative; height: 100%; transition: 0.2s; }
        .product-img { aspect-ratio: 1/1; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 2rem; overflow: hidden; }
        .product-img img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 10px; }
        .product-title { font-size: 0.85rem; font-weight: 700; color: #333; margin: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.4rem; }
        .product-price { color: var(--green); font-weight: 800; margin-top: 5px; font-size: 0.95rem; }
        .stock-tag { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; font-size: 0.6rem; padding: 4px 8px; border-radius: 4px; font-weight: 700; z-index: 2; }
        .search-input { border-radius: 50px; padding: 12px 20px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <nav class="bg-white border-bottom py-3 sticky-top">
        <div class="container d-flex justify-content-between" style="max-width: 600px;">
            <a href="#" id="navStoreLink" class="fw-bold text-dark text-decoration-none">
                <i class="bi bi-shop me-2 text-success"></i> <span id="displayStoreName">Loading...</span>
            </a>
            <span class="text-muted small">Powered by myvendor</span>
        </div>
    </nav>

    <main class="container py-4" style="max-width: 600px;">
        <div class="mb-4">
            <input type="text" id="searchInput" class="form-control search-input" placeholder="Search products..." onkeyup="searchStore()">
        </div>

        <div class="row g-3" id="productGrid">
            </div>

        <div id="emptyState" class="text-center py-5 hidden">
            <i class="bi bi-search fs-1 text-muted"></i>
            <h5 class="mt-3">No products found</h5>
            <p class="text-muted">Try searching for something else.</p>
        </div>
    </main>

    <script type="module" src="/assets/js/storefront.js"></script>
</body>
</html>
