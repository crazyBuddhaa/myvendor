<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>myvendor · Artisanal Storefront</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --green-deep: #0b3b2a;
            --green-primary: #1f6e43;
            --green-bright: #2b9b5a;
            --green-soft: #e4f5e9;
            --cream-bg: #fefaf5;
            --cream-card: #ffffff;
            --text-dark: #1c2a1f;
            --text-muted: #5c6e5a;
            --border-light: #e8e2d9;
            --shadow-sm: 0 6px 14px rgba(0, 24, 8, 0.04);
            --shadow-md: 0 12px 28px rgba(0, 32, 8, 0.08);
            --radius-md: 14px;
            --radius-sm: 12px;
        }

        body {
            background: var(--cream-bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* subtle grain texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 280px;
            opacity: 0.025;
            pointer-events: none;
            z-index: 9999;
        }

        /* modern header – glass-like */
        .store-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11, 59, 42, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0.7rem 0;
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 640px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .store-brand {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            text-decoration: none;
        }

        .brand-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #2b9b5a, #1f6e43);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .brand-wordmark {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 1.25rem;
            letter-spacing: -0.3px;
            color: white;
            line-height: 1.2;
        }

        .brand-wordmark small {
            display: block;
            font-family: 'Inter', sans-serif;
            font-size: 0.55rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #b9e6c2;
            margin-top: 2px;
        }

        /* hero section – minimal elegance */
        .hero-section {
            padding: 2rem 1rem 1.2rem;
            text-align: center;
            background: linear-gradient(115deg, #eaf6e6, #fff7ef);
            border-bottom: 1px solid var(--border-light);
        }

        .hero-eyebrow {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--green-primary);
            margin-bottom: 0.6rem;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(1.6rem, 5vw, 2.3rem);
            color: var(--green-deep);
            line-height: 1.2;
        }

        .hero-title em {
            font-style: italic;
            color: var(--green-bright);
            background: linear-gradient(145deg, #1f6e43, #2b9b5a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* search bar */
        .search-zone {
            max-width: 640px;
            margin: 0 auto;
            padding: 0.5rem 1rem;
        }

        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
        }

        #searchInput {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.7rem;
            border: 1.5px solid var(--border-light);
            border-radius: 60px;
            font-size: 0.85rem;
            background: white;
            transition: all 0.2s;
            font-weight: 500;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--green-bright);
            box-shadow: 0 0 0 4px rgba(43, 155, 90, 0.12);
        }

        /* category pills */
        .filter-track {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0.5rem 1rem 0.8rem;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .filter-track::-webkit-scrollbar {
            height: 3px;
        }

        .filter-track::-webkit-scrollbar-track {
            background: #e2e0da;
            border-radius: 10px;
        }

        .filter-track::-webkit-scrollbar-thumb {
            background: var(--green-primary);
            border-radius: 10px;
        }

        .filter-pill {
            background: white;
            border: 1px solid var(--border-light);
            color: var(--text-muted);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-pill.active {
            background: var(--green-deep);
            border-color: var(--green-deep);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        /* section header */
        .section-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 1rem 1rem 0.8rem;
            flex-wrap: wrap;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 1rem;
            color: var(--green-deep);
            letter-spacing: -0.2px;
        }

        .product-count {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--text-muted);
            background: #f2ede5;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
        }

        /* product grid – uniform card size */
        #productGrid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.9rem;
            padding: 0 1rem 1rem;
        }

        /* product card – compact and uniform */
        .product-card {
            background: var(--cream-card);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease, box-shadow 0.25s;
            cursor: pointer;
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }

        /* fixed image container – uniform size */
        .prod-img {
            aspect-ratio: 1 / 1;
            background: #f8f2ea;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .prod-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .product-card:hover .prod-img img {
            transform: scale(1.03);
        }

        .sold-out-tag {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            color: white;
            font-size: 0.55rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            letter-spacing: 0.3px;
            z-index: 2;
        }

        .prod-info {
            padding: 0.7rem 0.7rem 0.8rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .prod-title {
            font-weight: 700;
            font-size: 0.8rem;
            line-height: 1.3;
            color: var(--text-dark);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.1rem;
        }

        .prod-price {
            font-weight: 800;
            font-size: 0.9rem;
            color: var(--green-primary);
            font-family: 'Inter', monospace;
            margin-top: auto;
        }

        /* loading state */
        .loading-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2.5rem 0;
        }

        .loader {
            width: 36px;
            height: 36px;
            border: 2.5px solid var(--border-light);
            border-top-color: var(--green-bright);
            border-radius: 50%;
            margin: 0 auto 0.6rem;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* empty state */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2rem 1rem;
            background: white;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-light);
        }

        .empty-icon {
            font-size: 2rem;
            color: var(--text-muted);
            opacity: 0.6;
            margin-bottom: 0.8rem;
        }

        /* footer */
        .store-footer {
            margin-top: 1.5rem;
            padding: 1rem;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-light);
            background: transparent;
        }

        .store-footer a {
            color: var(--green-primary);
            text-decoration: none;
            font-weight: 600;
        }

        /* responsive */
        @media (min-width: 640px) {
            #productGrid {
                gap: 1rem;
            }
            .prod-info {
                padding: 0.8rem 0.8rem 0.9rem;
            }
            .prod-title {
                font-size: 0.85rem;
            }
            .prod-price {
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .section-header {
                margin: 0.8rem 0.75rem 0.6rem;
            }
            .prod-title {
                font-size: 0.75rem;
                min-height: 2rem;
            }
            .prod-price {
                font-size: 0.85rem;
            }
            .filter-pill {
                padding: 0.35rem 0.9rem;
                font-size: 0.7rem;
            }
        }

        /* animation for product items */
        .product-item {
            animation: fadeUp 0.3s ease-out forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* hidden utility */
        .hidden {
            display: none !important;
        }

        /* Add-to-cart button on product card */
        .atc-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: var(--green-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
            transition: transform 0.15s, background 0.15s;
            z-index: 3;
        }
        .atc-btn:active { transform: scale(0.88); }
        .atc-btn:hover  { background: var(--green-deep); }

        /* Cart FAB */
        #mvFab {
            position: fixed;
            bottom: 24px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--green-primary);
            color: white;
            border: none;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 4px 18px rgba(11,59,42,0.32);
            cursor: pointer;
            z-index: 200;
            transition: transform 0.2s;
        }
        #mvBadge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #dc2626;
            color: white;
            font-size: 0.62rem;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            padding: 0 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        /* Overlay */
        #mvOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.42);
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        #mvOverlay.open { opacity: 1; pointer-events: all; }

        /* Cart panel */
        #mvPanel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: min(420px, 100vw);
            background: var(--cream-card);
            z-index: 400;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
            box-shadow: -4px 0 28px rgba(0,0,0,0.12);
        }
        #mvPanel.open { transform: translateX(0); }

        .cp-header {
            background: var(--green-deep);
            padding: 1.1rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .cp-footer {
            border-top: 1px solid var(--border-light);
            padding: 1rem 1.2rem;
            flex-shrink: 0;
            background: white;
        }
        .cp-step {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .cp-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 1.2rem;
            -webkit-overflow-scrolling: touch;
        }
        .cp-form-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.2rem;
            -webkit-overflow-scrolling: touch;
        }
        .cp-input {
            width: 100%;
            padding: .75rem 1rem;
            border: 1.5px solid var(--border-light);
            border-radius: 12px;
            background: var(--cream-bg);
            font-family: 'Inter', sans-serif;
            font-size: .9rem;
            color: var(--text-dark);
            transition: border-color .2s;
            box-sizing: border-box;
        }
        .cp-input:focus { outline: none; border-color: var(--green-primary); box-shadow: 0 0 0 3px rgba(31,110,67,.1); }
        .cp-label {
            display: block;
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--text-muted);
            margin-bottom: .3rem;
        }
        .cp-checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--green-primary), var(--green-deep));
            border: none;
            padding: .88rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: .95rem;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            transition: opacity .2s;
        }
        .cp-checkout-btn:disabled { opacity: .45; cursor: default; }
        .cp-wa-btn {
            width: 100%;
            background: #25D366;
            border: none;
            padding: .88rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: .95rem;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
        }
        .cp-back-btn {
            border: none;
            background: none;
            color: var(--green-primary);
            font-size: .82rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0 0 1rem;
            display: flex;
            align-items: center;
            gap: .3rem;
        }
    </style>
</head>
<body>

<nav class="store-header">
    <div class="header-inner">
        <a href="#" id="navStoreLink" class="store-brand">
            <div class="brand-icon"><i class="bi bi-flower2"></i></div>
            <div class="brand-wordmark">
                <span id="displayStoreName">Artisan Shop</span>
                <small>Official Storefront</small>
            </div>
        </a>
        <button id="navCartBtn" onclick="mvOpenCart()" aria-label="View cart" style="display:none;position:relative;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);color:white;border-radius:40px;padding:.4rem .85rem .4rem .7rem;font-size:.8rem;font-weight:700;cursor:pointer;flex-direction:row;align-items:center;gap:.4rem;backdrop-filter:blur(4px);transition:background .2s;">
            <i class="bi bi-bag" style="font-size:.95rem;"></i>
            <span id="navCartCount">0</span>
            <span style="font-size:.75rem;opacity:.85;">items</span>
        </button>
    </div>
</nav>

<div class="hero-section">
    <div class="hero-eyebrow">curated collection</div>
    <h1 class="hero-title">Fresh finds,<br><em>naturally yours</em></h1>
</div>

<main>
    <div class="search-zone">
        <div class="search-wrapper">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Search products..." onkeyup="searchStore()" autocomplete="off">
        </div>
    </div>

    <div id="categoryFilters" class="filter-track" style="display: none;"></div>

    <div class="section-header">
        <span class="section-title">All offerings</span>
        <span class="product-count" id="productCount">0 items</span>
    </div>

    <div id="productGrid">
        <div class="loading-state">
            <div class="loader"></div>
            <span>Loading fresh inventory...</span>
        </div>
    </div>

    <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon"><i class="bi bi-search-heart"></i></div>
        <h5 style="font-weight: 700; font-size: 0.9rem;">No products found</h5>
        <p style="font-size: 0.75rem;">Try a different search term or browse all categories.</p>
    </div>
</main>

<footer class="store-footer">
    <span>© 2026 myvendor · </span>
    <a href="#">Careers</a> &nbsp;·&nbsp;
    <a href="#">Sustainability</a>
</footer>

<!-- Cart FAB -->
<button id="mvFab" onclick="mvOpenCart()" aria-label="View cart">
    <i class="bi bi-bag-fill"></i>
    <span id="mvBadge">0</span>
</button>

<!-- Cart overlay -->
<div id="mvOverlay" onclick="mvCloseCart()"></div>

<!-- Cart panel -->
<div id="mvPanel" role="dialog" aria-label="Shopping cart">
    <!-- Header -->
    <div class="cp-header">
        <span style="font-family:'Playfair Display',serif;font-weight:700;color:white;font-size:1rem;display:flex;align-items:center;gap:.5rem;">
            <i class="bi bi-bag-check"></i> My Cart
        </span>
        <button onclick="mvCloseCart()" style="background:rgba(255,255,255,.15);border:none;color:white;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;">
            <i class="bi bi-x-lg"></i>
        </button>
    </div>

    <!-- Step 1: Item list -->
    <div id="stepItems" class="cp-step">
        <div id="mvCartBody" class="cp-scroll"></div>
        <div class="cp-footer">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;">
                <span style="font-weight:600;font-size:.88rem;color:var(--text-muted);">Total</span>
                <span id="mvTotal" style="font-family:'Playfair Display',serif;font-weight:700;font-size:1.2rem;color:var(--green-deep);">₦0</span>
            </div>
            <button id="mvCheckoutBtn" class="cp-checkout-btn" onclick="mvGoCheckout()" disabled>
                <i class="bi bi-arrow-right-circle"></i> Proceed to Checkout
            </button>
        </div>
    </div>

    <!-- Step 2: Checkout form -->
    <div id="stepCheckout" class="cp-step" style="display:none;">
        <div class="cp-form-scroll">
            <button class="cp-back-btn" onclick="mvBackItems()">
                <i class="bi bi-arrow-left"></i> Back to cart
            </button>
            <form onsubmit="mvPlaceOrder(event)">
                <div style="margin-bottom:.85rem;">
                    <label class="cp-label">Your name</label>
                    <input id="mvName" type="text" required class="cp-input">
                </div>
                <div style="margin-bottom:.85rem;">
                    <label class="cp-label">Phone number</label>
                    <input id="mvPhone" type="tel" required class="cp-input">
                </div>
                <div style="margin-bottom:.85rem;">
                    <label class="cp-label">Delivery address</label>
                    <textarea id="mvAddress" required rows="2" class="cp-input" style="resize:none;"></textarea>
                </div>
                <div style="margin-bottom:1.4rem;">
                    <label class="cp-label">Notes (optional)</label>
                    <input id="mvNotes" type="text" class="cp-input" placeholder="Colour, size, etc.">
                </div>
                <button type="submit" class="cp-wa-btn">
                    <i class="bi bi-whatsapp"></i> Send Order via WhatsApp
                </button>
            </form>
        </div>
    </div>
</div>

<!-- External storefront logic (handles data, search, filters, product rendering) -->
<script type="module" src="/assets/js/storefront.js"></script>

</body>
</html>
